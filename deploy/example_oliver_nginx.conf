# Oliver-Multiworld-Squirrel — host-side nginx snippet.
#
# This is for the **host** Ubuntu nginx (system service, e.g. /etc/nginx/),
# NOT the nginx running inside docker-compose. Place this file at:
#
#   /etc/nginx/sites-available/oliver.multiworld.gg.conf
#
# then symlink to enable:
#
#   sudo ln -s /etc/nginx/sites-available/oliver.multiworld.gg.conf \
#              /etc/nginx/sites-enabled/oliver.multiworld.gg.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# (On distros that use /etc/nginx/conf.d/ instead of sites-{available,enabled},
# drop the file straight into conf.d/.)
#
# Topology assumed:
#   - Oliver runs as the `oliver` Docker compose service on this same Ubuntu host.
#   - That service publishes port 3000 to the host's loopback interface only
#     (`ports: - "127.0.0.1:3000:3000"` in deploy/docker-compose.yml).
#   - This host-nginx server block proxies `oliver.multiworld.gg` → 127.0.0.1:3000.
#   - The Docker container is NOT directly internet-reachable; only host nginx is.
#
# DNS: add an A record for `oliver.multiworld.gg` pointing at this host's
# public IP before reloading nginx.
#
# TLS: this snippet is HTTP-only on :80. Two options for TLS:
#   (a) Upstream TLS (e.g. Cloudflare proxy in front) — leave as-is.
#   (b) Host-local TLS via certbot + Let's Encrypt:
#         sudo certbot --nginx -d oliver.multiworld.gg
#       certbot will rewrite this file in place to add the `listen 443 ssl`
#       block + `ssl_certificate` directives. Idempotent; safe to run after
#       this file is enabled.

upstream oliver_backend {
    server 127.0.0.1:3000 fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name oliver.multiworld.gg;

    # GitHub webhook payloads are well under 1MB; tighten this to limit the
    # blast radius of any future webhook-payload-based DoS attempt.
    client_max_body_size 1M;
    keepalive_timeout 5;

    # Probot has a built-in healthcheck at /probot which renders a small HTML
    # page showing installation count etc. Useful for `curl
    # http://oliver.multiworld.gg/probot` after first deploy.
    #
    # The webhook endpoint is `/` (POST). GitHub sends X-Hub-Signature-256
    # which Probot verifies inside the container; nginx just forwards.
    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_pass http://oliver_backend;
    }
}
