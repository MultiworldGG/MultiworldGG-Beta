# GitHub-bot — host-side nginx snippet (with edge HMAC validation + TLS).
#
# This is for the **host** Ubuntu nginx (system service, /etc/nginx/),
# NOT the nginx running inside docker-compose. Place this file at:
#
#   /etc/nginx/sites-available/oliver.multiworld.gg.conf
#
# then symlink to enable:
#
#   sudo ln -s /etc/nginx/sites-available/oliver.multiworld.gg.conf \
#              /etc/nginx/sites-enabled/oliver.multiworld.gg.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# ---------------------------------------------------------------------------
# Prerequisites
# ---------------------------------------------------------------------------
#
# 1. njs (NGINX JavaScript) module:
#      sudo apt install libnginx-mod-http-js
#
# 2. The validation script:
#      sudo mkdir -p /etc/nginx/njs
#      sudo cp deploy/github-bot-nginx-njs/hmac.js /etc/nginx/njs/
#      sudo chmod 0644 /etc/nginx/njs/hmac.js
#
# 3. The webhook secret, readable by the nginx user (typically www-data):
#      sudo mkdir -p /etc/github-bot
#      sudo cp deploy/github-bot-secrets/oliver_webhook_secret /etc/github-bot/webhook_secret
#      sudo chgrp www-data /etc/github-bot/webhook_secret
#      sudo chmod 0640 /etc/github-bot/webhook_secret
#      sudo chmod 0750 /etc/github-bot
#
# 4. Let's Encrypt cert for oliver.multiworld.gg:
#      sudo certbot certonly --nginx -d oliver.multiworld.gg
#    OR if you prefer to drop this snippet in first and let certbot rewrite
#    the ssl_certificate lines:
#      drop the HTTP-only redirect block in (commenting out the HTTPS server
#      below), then `sudo certbot --nginx -d oliver.multiworld.gg`.
#
# 5. DNS A record for oliver.multiworld.gg pointing at this host's public IP.

js_path "/etc/nginx/njs/";
js_import hmac.js;

upstream bot_backend {
    server 127.0.0.1:3000 fail_timeout=0;
}

# HTTP → HTTPS redirect.
server {
    listen 80;
    listen [::]:80;
    server_name oliver.multiworld.gg;
    return 301 https://$host$request_uri;
}

# HTTPS — TLS terminates here on this nginx.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name oliver.multiworld.gg;

    ssl_certificate     /etc/letsencrypt/live/oliver.multiworld.gg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oliver.multiworld.gg/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # GitHub webhook payloads are well under 1MB.
    client_max_body_size 1M;
    client_body_buffer_size 1m;
    keepalive_timeout 5;

    # All requests go through HMAC validation in njs first. The js handler
    # returns 401 for missing/bad signatures *before* any proxy_pass occurs.
    # Only on a valid signature does it internalRedirect to @bot_backend.
    # GET /probot, /status, /status/.json are allowed through unauthenticated.
    location / {
        js_content hmac.validate;
    }

    location @bot_backend {
        internal;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_set_header Host              $http_host;
        proxy_redirect off;
        proxy_pass http://bot_backend;
    }
}

