# GitHub-bot — host-side nginx snippet (with edge HMAC validation).
#
# This is for the **host** Ubuntu nginx (system service, e.g. /etc/nginx/),
# NOT the nginx running inside docker-compose. Place this file at:
#
#   /etc/nginx/sites-available/oliver.multiworld.gg.conf
#
# then symlink to enable:
#
#   sudo ln -s /etc/nginx/sites-available/oliver.multiworld.gg.conf \
#              /etc/nginx/sites-enabled/oliver.multiworld.gg.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# (On distros that use /etc/nginx/conf.d/ instead of sites-{available,enabled},
# drop the file straight into conf.d/.)
#
# ---------------------------------------------------------------------------
# Prerequisites for nginx-edge HMAC validation
# ---------------------------------------------------------------------------
#
# 1. njs (NGINX JavaScript) module:
#      sudo apt install libnginx-mod-http-js
#    On Ubuntu 22.04+ this provides /etc/nginx/modules-enabled/50-mod-http-js.conf
#    which auto-loads the module at nginx startup.
#
# 2. The validation script:
#      sudo mkdir -p /etc/nginx/njs
#      sudo cp deploy/github-bot-nginx-njs/hmac.js /etc/nginx/njs/
#      sudo chmod 0644 /etc/nginx/njs/hmac.js
#
# 3. The webhook secret, readable by the nginx user (typically www-data):
#      sudo mkdir -p /etc/github-bot
#      sudo cp deploy/github-bot-secrets/oliver_webhook_secret /etc/github-bot/webhook_secret
#      sudo chgrp www-data /etc/github-bot/webhook_secret
#      sudo chmod 0640 /etc/github-bot/webhook_secret
#      sudo chmod 0750 /etc/github-bot
#
# ---------------------------------------------------------------------------
# Topology
# ---------------------------------------------------------------------------
#
#   internet ─TLS─▶ system nginx :80 (this file)
#                     │
#                     ▼ js_content hmac.validate
#                  (HMAC check; 401 on mismatch — never reaches the proxy)
#                     │
#                     ▼ internalRedirect @bot_backend
#                  proxy_pass http://127.0.0.1:3000
#                     │
#                     ▼
#                  github-bot Docker container (loopback-published port)
#
# Probot inside the container ALSO validates HMAC. Both layers stack.
#
# ---------------------------------------------------------------------------
# DNS
# ---------------------------------------------------------------------------
#
# Add an A record for `oliver.multiworld.gg` pointing at this host's public IP
# before reloading nginx.
#
# ---------------------------------------------------------------------------
# TLS
# ---------------------------------------------------------------------------
#
# This snippet is HTTP-only on :80. Two options:
#   (a) Upstream TLS (e.g. Cloudflare proxy in front) — leave as-is.
#   (b) Host-local TLS via certbot + Let's Encrypt:
#         sudo certbot --nginx -d oliver.multiworld.gg
#       certbot will rewrite this file in place to add the listen 443 ssl block.
#       Idempotent; safe to run after this file is enabled.

js_path "/etc/nginx/njs/";
js_import hmac.js;

upstream bot_backend {
    server 127.0.0.1:3000 fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name oliver.multiworld.gg;

    # GitHub webhook payloads are well under 1MB; tighten to limit blast radius.
    client_max_body_size 1M;
    client_body_buffer_size 1m;  # buffer body so njs can read it without spilling to disk
    keepalive_timeout 5;

    # All requests go through HMAC validation first. The js handler returns 401
    # for missing/bad signatures *before* any proxy_pass occurs. Only on a valid
    # signature does it internalRedirect to @bot_backend.
    #
    # GET /probot and GET /status are allowed through unauthenticated.
    location / {
        js_content hmac.validate;
    }

    location @bot_backend {
        internal;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_pass http://bot_backend;
    }
}

# ---------------------------------------------------------------------------
# Fallback: simple proxy without njs (uncomment if you can't install njs)
# ---------------------------------------------------------------------------
