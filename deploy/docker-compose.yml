services:
  multiworld:
    # Build only once. Web service uses the same image build
    build:
      context: ..
    # Name image for use in web service
    image: archipelago-base
    # Use locally-built image
    pull_policy: never
    # Launch main process without website hosting (config override)
    entrypoint: python WebHost.py --config_override selflaunch.yaml
    volumes:
      # Mount application volume
      - app_volume:/app

      # Mount configs
      - ./example_config.yaml:/app/config.yaml
      - ./example_selflaunch.yaml:/app/selflaunch.yaml

    # Expose on host network for access to dynamically mapped ports
    network_mode: host

    # No Healthcheck in place yet for multiworld
    healthcheck:
      test: ["NONE"]
  web:
    # Use image build by multiworld service
    image: archipelago-base
    # Use locally-built image
    pull_policy: never
    # Launch gunicorn targeting WebHost application
    entrypoint: gunicorn -c gunicorn.conf.py
    volumes:
      # Mount application volume
      - app_volume:/app

      # Mount configs
      - ./example_config.yaml:/app/config.yaml
      - ./example_gunicorn.conf.py:/app/gunicorn.conf.py
    environment:
      # Bind gunicorn on 8000
      - PORT=8000

  nginx:
    image: nginx:stable-alpine
    volumes:
      # Mount application volume
      - app_volume:/app

      # Mount config
      - ./example_nginx.conf:/etc/nginx/nginx.conf
    ports:
      # Nginx listening internally on port 80 -- mapped to 8080 on host
      - 8080:80
    depends_on:
      - web

  # Oliver-Multiworld-Squirrel: GitHub App webhook receiver.
  # Publishes port 3000 to the host's loopback only — host nginx (running on the
  # Ubuntu host, NOT in this compose stack) proxies oliver.multiworld.gg to
  # 127.0.0.1:3000. See deploy/example_oliver_nginx.conf for the host-side snippet.
  oliver:
    build:
      context: ../GitHubLib
    image: multiworldgg-oliver
    pull_policy: never
    env_file:
      # Operator must copy example_oliver.env to oliver.env (chmod 0600) and fill in
      # OLIVER_APP_ID, OLIVER_PRIVATE_KEY (or _FILE), OLIVER_WEBHOOK_SECRET before
      # bringing this up.
      - ./oliver.env
    volumes:
      # Recommended: mount a host directory of secret files at /run/secrets so
      # OLIVER_*_FILE env vars (in oliver.env) can point at them. Create the
      # directory at <repo>/deploy/oliver-secrets/ on the host (mode 0700, owner
      # root or the docker daemon user) and place files there:
      #   oliver-secrets/oliver_app_id            # one-line numeric App ID
      #   oliver-secrets/oliver_private_key.pem   # full PEM
      #   oliver-secrets/oliver_webhook_secret    # one-line hex string
      # Then in oliver.env set:
      #   OLIVER_APP_ID_FILE=/run/secrets/oliver_app_id
      #   OLIVER_PRIVATE_KEY_FILE=/run/secrets/oliver_private_key.pem
      #   OLIVER_WEBHOOK_SECRET_FILE=/run/secrets/oliver_webhook_secret
      - ./oliver-secrets:/run/secrets:ro
    ports:
      # Loopback-only — only host nginx (or other host-side processes) can reach this.
      # NOT exposed to the public internet directly; TLS terminates at host nginx (or upstream).
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/probot"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  # Share application directory amongst multiworld and web services
  # (for access to log files and the like), and nginx (for static files)
  app_volume:
