[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.ror1"
dynamic = ["version"]
description = "MultiWorld: Risk of Rain"
authors = [
    {name = "studkid"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.ror1"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.ror1.Constants.VERSION"}
