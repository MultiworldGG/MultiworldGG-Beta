[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.ror1"
version = "1.0.1"
description = "MultiWorld: Risk of Rain"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "studkid"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.ror1",]
namespaces = true
