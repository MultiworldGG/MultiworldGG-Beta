[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.earthbound"
dynamic = ["version"]
description = "MultiWorld: EarthBound"
authors = [
    {name = "Pink Switch"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.earthbound"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.earthbound.Constants.VERSION"}
