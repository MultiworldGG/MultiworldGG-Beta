[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.shorthike"
dynamic = ["version"]
description = "MultiWorld: A Short Hike"
authors = [
    {name = "chandler05"},
    {name = "BrandenEK"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.shorthike"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.shorthike.Constants.VERSION"}
