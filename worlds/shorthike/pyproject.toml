[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.shorthike"
version = "1.0.1"
description = "MultiWorld: A Short Hike"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "chandler05"

[[project.authors]]
name = "BrandenEK"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.shorthike",]
namespaces = true
