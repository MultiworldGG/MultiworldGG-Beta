[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.minecraft"
version = "0.1.6"
description = "MultiWorld: Minecraft"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
dependencies = [ "requests >= 2.28.1",]
[[project.authors]]
name = "KonoTyran"

[[project.authors]]
name = "JacobMIX"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.minecraft",]
namespaces = true
