[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.minecraft"
dynamic = ["version"]
description = "MultiWorld: Minecraft"
authors = [
    {name = "KonoTyran"},
    {name = "espeon"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"
dependencies = [
    "requests >= 2.28.1",
]

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.minecraft"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.minecraft.Constants.VERSION"}
