[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sims4"
version = "1.7.4"
description = "MultiWorld: Archipelago"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "bennydreamly"

[[project.authors]]
name = "itsmisscactus"

[[project.authors]]
name = "mrsummer360"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.sims4",]
namespaces = true
