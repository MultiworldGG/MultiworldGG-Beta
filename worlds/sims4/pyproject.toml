[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sims4"
version = "1.6.1"
description = "MultiWorld: The Sims 4"
license = "MIT"
license-files = [ "LICENSE",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "bennydreamly"

[project.entry-points."mwgg.client"]
"worlds.sims4.Client" = "worlds.sims4.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.sims4",]
namespaces = true
