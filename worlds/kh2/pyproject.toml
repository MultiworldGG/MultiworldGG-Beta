[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.kh2"
dynamic = ["version"]
description = "MultiWorld: Kingdom Hearts 2"
authors = [
    {name = "JaredWeakStrike"},
    {name = "Shananas"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"
dependencies = [
    "Pymem>=1.10.0",
    "werkzeug>=3.1.0"
]

[project.entry-points."mwgg.client"]
"worlds.kh2.Client" = "worlds.kh2.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.kh2"]

[tool.setuptools.dynamic]
version = {attr = "worlds.kh2.Constants.VERSION"}
