[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.kh2"
version = "0.0.2"
description = "MultiWorld: Kingdom Hearts 2"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "JaredWeakStrike"

[[project.authors]]
name = "Shananas"

[project.entry-points."mwgg.client"]
"worlds.kh2.Client" = "worlds.kh2.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.kh2",]
