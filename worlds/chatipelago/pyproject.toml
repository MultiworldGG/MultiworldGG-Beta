[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.chatipelago"
dynamic = ["version"]
description = "MultiWorld: Chatipelago"
authors = [
    {name = "Delilah, Dranzior, LMarioza"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.chatipelago"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.chatipelago.Constants.VERSION"}
