[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.chatipelago"
version = "0.0.0"
description = "MultiWorld: Chatipelago"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Delilah, Dranzior, LMarioza"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.chatipelago",]
namespaces = true
