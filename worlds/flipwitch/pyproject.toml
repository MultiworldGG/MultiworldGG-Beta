[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.flipwitch"
dynamic = ["version"]
description = "MultiWorld: FlipWitch - Forbidden Sex Hex"
authors = [
    {name = "Albrekka"},
    {name = "Prin"},
    {name = "SomeLazyGamer"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.flipwitch"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.flipwitch.Register.VERSION"}
