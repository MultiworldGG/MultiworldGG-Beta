[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.flipwitch"
version = "1.0.1"
description = "MultiWorld: FlipWitch - Forbidden Sex Hex"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Albrekka"

[[project.authors]]
name = "Prin"

[[project.authors]]
name = "SomeLazyGamer"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.flipwitch",]
namespaces = true
