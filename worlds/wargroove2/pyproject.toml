[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.wargroove2"
dynamic = ["version"]
description = "MultiWorld: Wargroove 2"
authors = [
    {name = "Fly Sniper"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.wargroove2"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.wargroove2.Constants.VERSION"}
