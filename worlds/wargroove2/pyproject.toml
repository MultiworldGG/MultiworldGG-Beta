[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.wargroove2"
version = "1.0.2"
description = "MultiWorld: Archipelago"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Fly Sniper"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.wargroove2",]
namespaces = true
