[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.wargroove2"
version = "0.0.0"
description = "MultiWorld: Wargroove 2"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Fly Sniper"

[project.entry-points."mwgg.client"]
"worlds.wargroove2.Client" = "worlds.wargroove2.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.wargroove2",]
namespaces = true
