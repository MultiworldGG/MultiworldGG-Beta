[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.simpsonshitnrun"
version = "1.0.1"
description = "MultiWorld: The Simpsons Hit And Run"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Caesius"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.simpsonshitnrun",]
namespaces = true
