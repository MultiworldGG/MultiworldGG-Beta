[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.landstalker"
dynamic = ["version"]
description = "MultiWorld: Landstalker - The Treasures of King Nole"
authors = [
    {name = "Dinopony"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.landstalker"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.landstalker.Constants.VERSION"}
