[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.landstalker"
version = "1.8.7"
description = "MultiWorld: Landstalker - The Treasures of King Nole"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Dinopony"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.landstalker",]
namespaces = true
