[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sm64ex"
version = "0.0.0"
description = "MultiWorld: Super Mario 64"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "N00byKing"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.sm64ex",]
namespaces = true
