[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sm64ex"
dynamic = ["version"]
description = "MultiWorld: Super Mario 64"
authors = [
    {name = "N00byKing"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.sm64ex"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.sm64ex.Register.VERSION"}
