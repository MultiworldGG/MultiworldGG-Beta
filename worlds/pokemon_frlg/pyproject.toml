[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.pokemon_frlg"
version = "0.0.0"
description = "MultiWorld: Pokemon FireRed and LeafGreen"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Vyneras"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.pokemon_frlg",]
namespaces = true
