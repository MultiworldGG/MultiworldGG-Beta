[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.pokemon_frlg"
dynamic = ["version"]
description = "MultiWorld: Pokemon FireRed and LeafGreen"
authors = [
    {name = "Vyneras"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.pokemon_frlg"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.pokemon_frlg.Constants.VERSION"}
