[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.tmc"
version = "1.0.1"
description = "MultiWorld: The Minish Cap"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "EternalCode"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.tmc",]
namespaces = true
