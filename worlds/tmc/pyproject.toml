[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.tmc"
dynamic = ["version"]
description = "MultiWorld: The Minish Cap"
authors = [
    {name = "EternalCode"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.tmc"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.tmc.Register.VERSION"}
