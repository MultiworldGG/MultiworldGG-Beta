[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.mm_recomp"
version = "1.0.1"
description = "MultiWorld: Majora's Mask Recompiled"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "LittleCube"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.mm_recomp",]
namespaces = true
