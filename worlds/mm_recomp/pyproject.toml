[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.mm_recomp"
dynamic = ["version"]
description = "MultiWorld: Majora's Mask Recompiled"
authors = [
    {name = "LittleCube"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.mm_recomp"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.mm_recomp.Constants.VERSION"}
