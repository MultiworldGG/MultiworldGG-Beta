[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.clique"
version = "0.0.0"
description = "MultiWorld: Clique"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Phar"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.clique",]
namespaces = true
