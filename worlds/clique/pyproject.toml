[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.clique"
dynamic = ["version"]
description = "MultiWorld: Clique"
authors = [
    {name = "Phar"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.clique"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.clique.Constants.VERSION"}
