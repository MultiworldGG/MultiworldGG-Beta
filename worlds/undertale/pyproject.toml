[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.undertale"
dynamic = ["version"]
description = "MultiWorld: Undertale"
authors = [
    {name = "jonloveslegos"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[project.entry-points."mwgg.client"]
"worlds.undertale.Client" = "worlds.undertale.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.undertale"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.undertale.Constants.VERSION"}
