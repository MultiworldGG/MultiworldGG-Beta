[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.undertale"
version = "0.0.0"
description = "MultiWorld: Undertale"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "jonloveslegos"

[project.entry-points."mwgg.client"]
"worlds.undertale.Client" = "worlds.undertale.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.undertale",]
namespaces = true
