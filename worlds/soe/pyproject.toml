[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.soe"
version = "0.50.1"
description = "MultiWorld: Secret of Evermore"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
dependencies = [ "pyevermizer==0.50.1",]
[[project.authors]]
name = "black-sliver"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.soe",]
namespaces = true
