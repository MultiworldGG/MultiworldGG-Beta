[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.soe"
dynamic = ["version"]
description = "MultiWorld: Secret of Evermore"
authors = [
    {name = "black-silver"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"
dependencies = [
    "pyevermizer==0.50.1",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.soe"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.soe.Register.VERSION"}
