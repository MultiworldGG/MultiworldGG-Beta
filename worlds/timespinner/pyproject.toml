[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.timespinner"
dynamic = ["version"]
description = "MultiWorld: Timespinner"
authors = [
    {name = "Jarno458"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.timespinner"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.timespinner.Constants.VERSION"}
