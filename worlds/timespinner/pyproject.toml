[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.timespinner"
version = "0.0.1"
description = "MultiWorld: Timespinner"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Jarno458"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.timespinner",]
namespaces = true
