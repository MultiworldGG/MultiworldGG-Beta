[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.factorio"
version = "0.0.2"
description = "MultiWorld: Factorio"
license = "MIT"
license-files = [ "LICENSE",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
dependencies = [ "factorio-rcon-py>=2.1.2",]
[[project.authors]]
name = "Berserker66"

[project.entry-points."mwgg.client"]
"worlds.factorio.Client" = "worlds.factorio.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.factorio",]
namespaces = true
