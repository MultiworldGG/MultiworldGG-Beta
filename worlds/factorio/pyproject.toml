[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.factorio"
dynamic = ["version"]
description = "MultiWorld: Factorio"
authors = [
    {name = "Berserker66"}
]
license = "MIT"
license-files = [
    "LICENSE"
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"
dependencies = [
    "factorio-rcon-py>=2.1.2",
]

[project.entry-points."mwgg.client"]
"worlds.factorio.Client" = "worlds.factorio.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.factorio"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.factorio.Register.VERSION"}
