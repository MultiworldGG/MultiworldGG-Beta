[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.xenobladex"
version = "1.0.1"
description = "MultiWorld: Xenoblade X"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Maragon"

[project.entry-points."mwgg.client"]
"worlds.xenobladex.Client" = "worlds.xenobladex.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.xenobladex",]
namespaces = true
