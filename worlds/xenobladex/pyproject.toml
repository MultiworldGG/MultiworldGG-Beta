[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.xenobladex"
dynamic = ["version"]
description = "MultiWorld: Xenoblade X"
authors = [
    {name = "Maragon"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.xenobladex"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.xenobladex.Constants.VERSION"}
