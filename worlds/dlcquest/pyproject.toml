[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.dlcquest"
version = "1.0.1"
description = "MultiWorld: DLCQuest"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "axe-y"

[[project.authors]]
name = "Kaito Kid"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.dlcquest",]
namespaces = true
