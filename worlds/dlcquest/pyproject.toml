[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.dlcquest"
dynamic = ["version"]
description = "MultiWorld: DLCQuest"
authors = [
    {name = "axe-y"},
    {name = "Kaito Kid"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.dlcquest"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.dlcquest.Constants.VERSION"}
