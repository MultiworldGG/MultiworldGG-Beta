[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.rimworld"
version = "1.2.5"
description = "MultiWorld: Rimworld"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Phantom Of Ares"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.rimworld",]
namespaces = true
