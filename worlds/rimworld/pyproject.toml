[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.rimworld"
dynamic = ["version"]
description = "MultiWorld: Rimworld"
authors = [
    {name = "Phantom Of Ares"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.rimworld"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.rimworld.Register.VERSION"}
