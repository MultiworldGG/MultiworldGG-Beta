[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.ff4fe"
version = "0.0.0"
description = "MultiWorld: Final Fantasy IV Free Enterprise"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
dependencies = [ "pillow", "cherrypy", "jinja2", "pymongo", "chardet", "requests", "markdown", "javascripthon", "python-dotenv", "lark", "FreeEnterprise4 @ git+https://github.com/Rosalie-A/FreeEnterprise4@v7",]
[[project.authors]]
name = "Rosalie"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.ff4fe",]
namespaces = true
