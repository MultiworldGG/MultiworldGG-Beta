[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.ff4fe"
dynamic = ["version"]
description = "MultiWorld: Final Fantasy IV Free Enterprise"
authors = [
    {name = "Rosalie"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"
dependencies = [
    "pillow",
    "cherrypy",
    "jinja2",
    "pymongo",
    "chardet",
    "requests",
    "markdown",
    "javascripthon",
    "python-dotenv",
    "lark",
    "FreeEnterprise4 @ git+https://github.com/Rosalie-A/FreeEnterprise4@v7",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.ff4fe"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.ff4fe.Register.VERSION"}
