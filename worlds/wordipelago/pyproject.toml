[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.wordipelago"
dynamic = ["version"]
description = "MultiWorld: Wordipelago"
authors = [
    {name = "ProfDeCube"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.wordipelago"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.wordipelago.Register.VERSION"}
