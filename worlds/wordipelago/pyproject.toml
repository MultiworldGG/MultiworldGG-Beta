[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.wordipelago"
version = "0.0.2"
description = "MultiWorld: Wordipelago"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "ProfDeCube"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.wordipelago",]
namespaces = true
