[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.tloz_ph"
version = "0.3.2"
description = "MultiWorld: The Legend of Zelda - Phantom Hourglass"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Carrotinator"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.tloz_ph",]
namespaces = true
