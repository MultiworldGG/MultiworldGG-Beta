[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.ctjot"
version = "1.0.1"
description = "MultiWorld: Chrono Trigger Jets of Time"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Anguirel"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.ctjot",]
namespaces = true
