[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.ctjot"
dynamic = ["version"]
description = "MultiWorld: Chrono Trigger Jets of Time"
authors = [
    {name = "Anguirel"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.ctjot"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.ctjot.Constants.VERSION"}
