[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.residentevil3remake"
version = "0.2.5"
description = "MultiWorld: Resident Evil 3 Remake"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "TheRealSolidusSnake"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.residentevil3remake",]
namespaces = true
