[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.residentevil3remake"
dynamic = ["version"]
description = "MultiWorld: Resident Evil 3 Remake"
authors = [
    {name = "TheRealSolidusSnake"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.residentevil3remake"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.residentevil3remake.Constants.VERSION"}
