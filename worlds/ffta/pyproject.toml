[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.ffta"
dynamic = ["version"]
description = "MultiWorld: Final Fantasy Tactics Advance"
authors = [
    {name = "spicynun"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.ffta"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.ffta.Register.VERSION"}
