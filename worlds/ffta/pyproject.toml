[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.ffta"
version = "1.0.1"
description = "MultiWorld: Final Fantasy Tactics Advance"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "spicynun"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.ffta",]
namespaces = true
