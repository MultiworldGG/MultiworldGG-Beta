[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.dk64"
version = "1.0.39"
description = "MultiWorld: Archipelago"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "2dos"

[[project.authors]]
name = "Killklli,"

[[project.authors]]
name = "Ballaam"

[tool.setuptools.packages.find]
where = [ "src",]
