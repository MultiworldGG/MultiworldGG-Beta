[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.dk64"
version = "1.4.20"
description = "MultiWorld: Archipelago"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "2dos"

[[project.authors]]
name = "AlmostSeagull"

[[project.authors]]
name = "Ballaam"

[[project.authors]]
name = "Green Bean"

[[project.authors]]
name = "Killklli"

[[project.authors]]
name = "Lrauq"

[[project.authors]]
name = "PoryGone"

[[project.authors]]
name = "Umed"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.dk64",]
namespaces = true
