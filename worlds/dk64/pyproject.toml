[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.dk64"
dynamic = ["version"]
description = "MultiWorld: Donkey Kong 64"
authors = [
    {name = "2dos"}, 
    {name = "Killklli"}, 
    {name = "Ballaam"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[project.entry-points."mwgg.client"]
dk64.Client = "dk64.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.dk64"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.dk64.Constants.VERSION"}
