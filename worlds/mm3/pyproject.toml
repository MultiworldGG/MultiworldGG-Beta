[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.mm3"
dynamic = ["version"]
description = "MultiWorld: Mega Man 3"
authors = [
    {name = "Silvris"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.mm3"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.mm3.Constants.VERSION"}
