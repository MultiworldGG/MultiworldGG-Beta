[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.mm3"
version = "0.1.7"
description = "MultiWorld: Mega Man 3"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Silvris"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.mm3",]
namespaces = true
