[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.rabi_ribi"
version = "1.4.2"
description = "MultiWorld: Archipelago"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "PsyMarth"

[[project.authors]]
name = "Phie"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.rabi_ribi",]
namespaces = true
