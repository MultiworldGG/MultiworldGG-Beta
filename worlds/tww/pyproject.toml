[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.tww"
version = "3.0.2"
description = "MultiWorld: The Wind Waker"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
dependencies = [ "dolphin-memory-engine>=1.3.0",]
[[project.authors]]
name = "tanjo3"

[project.entry-points."mwgg.client"]
"worlds.tww.Client" = "worlds.tww.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.tww",]
namespaces = true
