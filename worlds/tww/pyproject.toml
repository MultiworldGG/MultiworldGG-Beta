[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.tww"
dynamic = ["version"]
description = "MultiWorld: The Wind Waker"
authors = [
    {name = "tanjo3"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"
dependencies = [
    "dolphin-memory-engine>=1.3.0",
]

[project.entry-points."mwgg.client"]
tww.Client = "tww.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.tww"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.tww.Constants.VERSION"}
