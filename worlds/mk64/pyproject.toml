[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.mk64"
version = "0.0.0"
description = "MultiWorld: Mario Kart 64"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Edsploration"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.mk64",]
namespaces = true
