[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.mk64"
dynamic = ["version"]
description = "MultiWorld: Mario Kart 64"
authors = [
    {name = "Edsploration"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.mk64"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.mk64.Constants.VERSION"}
