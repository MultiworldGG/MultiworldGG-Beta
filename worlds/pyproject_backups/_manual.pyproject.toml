[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds._manual"
version = "1.0.0"
description = "MultiWorld: Manual Client"
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"


[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds._manual"]
namespaces = true

