[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.rotn"
version = "0.8.0"
description = "MultiWorld: Archipelago"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "studkid"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.rotn",]
namespaces = true
