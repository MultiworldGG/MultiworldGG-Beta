[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.monster_sanctuary"
version = "1.0.1"
description = "MultiWorld: Monster Sanctuary"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Saagael"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.monster_sanctuary",]
namespaces = true
