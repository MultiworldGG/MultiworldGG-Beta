[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.monster_sanctuary"
dynamic = ["version"]
description = "MultiWorld: Monster Sanctuary"
authors = [
    {name = "Saagael"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.monster_sanctuary"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.monster_sanctuary.Register.VERSION"}
