[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.jigsaw"
dynamic = ["version"]
description = "MultiWorld: Jigsaw"
authors = [
    {name = "spinerak"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.jigsaw"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.jigsaw.Register.VERSION"}
