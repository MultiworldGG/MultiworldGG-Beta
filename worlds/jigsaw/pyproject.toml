[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.jigsaw"
version = "0.8.2"
description = "MultiWorld: Jigsaw"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "spinerak"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.jigsaw",]
namespaces = true
