[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.ttyd"
dynamic = ["version"]
description = "MultiWorld: Paper Mario The Thousand Year Door"
authors = [
    {name = "jamesbrq"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"
dependencies = [
    "gclib[speedups] @ git+https://github.com/LagoLunatic/gclib.git@62df9574d99249ea16ec90dbcee9ea6b0759da29",
]

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.ttyd"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.ttyd.Constants.VERSION"}
