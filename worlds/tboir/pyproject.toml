[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.tboir"
dynamic = ["version"]
description = "MultiWorld: The Binding of Isaac Repentance"
authors = [
    {name = "Cyb3R"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.tboir"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.tboir.Constants.VERSION"}
