[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.tboir"
version = "0.0.0"
description = "MultiWorld: The Binding of Isaac Repentance"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Cyb3R"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.tboir",]
namespaces = true
