[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.bomb_rush_cyberfunk"
dynamic = ["version"]
description = "MultiWorld: Bomb Rush Cyberfunk"
authors = [
    {name = "CookieCat45"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.bomb_rush_cyberfunk"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.bomb_rush_cyberfunk.Register.VERSION"}
