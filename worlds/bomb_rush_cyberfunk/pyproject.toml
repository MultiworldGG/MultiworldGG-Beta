[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.bomb_rush_cyberfunk"
version = "0.0.0"
description = "MultiWorld: Bomb Rush Cyberfunk"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "CookieCat45"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.bomb_rush_cyberfunk",]
namespaces = true
