[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.rac2"
dynamic = ["version"]
description = "MultiWorld: Ratchet and Clank 2"
authors = [
    {name = "Evilwb"}
]
license = "MIT"
license-files = [
    "LICENSE.md"
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[project.entry-points."mwgg.client"]
"worlds.rac2.Client" = "worlds.rac2.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.rac2"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.rac2.Constants.VERSION"}
