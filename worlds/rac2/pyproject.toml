[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.rac2"
version = "1.0.1"
description = "MultiWorld: Ratchet and Clank 2"
license = "MIT"
license-files = [ "LICENSE.md",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Evilwb"

[project.entry-points."mwgg.client"]
"worlds.rac2.Client" = "worlds.rac2.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.rac2",]
namespaces = true
