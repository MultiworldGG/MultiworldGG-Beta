[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.ultrakill"
version = "0.0.0"
description = "MultiWorld: ULTRAKILL"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "TRPG"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.ultrakill",]
namespaces = true
