[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.ultrakill"
dynamic = ["version"]
description = "MultiWorld: ULTRAKILL"
authors = [
    {name = "TRPG"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.ultrakill"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.ultrakill.Constants.VERSION"}
