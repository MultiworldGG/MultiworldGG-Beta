[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.smz3"
version = "1.0.1"
description = "MultiWorld: SMZ3"
license = "MIT"
license-files = [ "LICENSE",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "lordlou"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.smz3",]
namespaces = true
