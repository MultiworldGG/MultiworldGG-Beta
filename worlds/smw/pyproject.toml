[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.smw"
dynamic = ["version"]
description = "MultiWorld: Super Mario World"
authors = [
    {name = "PoryGone"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.smw"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.smw.Constants.VERSION"}
