[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.smw"
version = "2.1.3"
description = "MultiWorld: Super Mario World"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "PoryGone"

[[project.authors]]
name = "lx5"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.smw",]
namespaces = true
