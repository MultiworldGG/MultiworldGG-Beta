[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.doronko_wanko"
version = "0.0.0"
description = "MultiWorld: DORONKO WANKO"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Vendily"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.doronko_wanko",]
namespaces = true
