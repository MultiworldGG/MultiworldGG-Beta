[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.doronko_wanko"
dynamic = ["version"]
description = "MultiWorld: DORONKO WANKO"
authors = [
    {name = "Vendily"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.doronko_wanko"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.doronko_wanko.Register.VERSION"}
