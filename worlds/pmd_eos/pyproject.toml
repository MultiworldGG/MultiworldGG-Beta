[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.pmd_eos"
dynamic = ["version"]
description = "MultiWorld: Pokemon Mystery Dungeon Explorers of Sky"
authors = [
    {name = "CrypticMonkey33"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.pmd_eos"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.pmd_eos.Constants.VERSION"}
