[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.pmd_eos"
version = "0.0.0"
description = "MultiWorld: Pokemon Mystery Dungeon Explorers of Sky"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "CrypticMonkey33"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.pmd_eos",]
namespaces = true
