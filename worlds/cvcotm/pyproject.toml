[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.cvcotm"
dynamic = ["version"]
description = "MultiWorld: Castlevania - Circle of the Moon"
authors = [
    {name = "LiquidCat64"}
]
license = "MIT AND (Apache-2.0)"
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.cvcotm"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.cvcotm.Register.VERSION"}
