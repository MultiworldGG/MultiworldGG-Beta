[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.cvcotm"
version = "1.0.1"
description = "MultiWorld: Castlevania - Circle of the Moon"
license = "MIT AND (Apache-2.0)"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "LiquidCat64"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.cvcotm",]
namespaces = true
