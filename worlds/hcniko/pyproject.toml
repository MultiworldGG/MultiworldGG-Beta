[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.hcniko"
version = "0.8.0"
description = "MultiWorld: Here Comes Niko!"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "nieli"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.hcniko",]
namespaces = true
