[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.hcniko"
dynamic = ["version"]
description = "MultiWorld: Here Comes Niko!"
authors = [
    {name = "nieli"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.hcniko"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.hcniko.Constants.VERSION"}
