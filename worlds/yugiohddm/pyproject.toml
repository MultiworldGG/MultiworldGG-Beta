[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.yugiohddm"
dynamic = ["version"]
description = "MultiWorld: Yu-Gi-Oh! Dungeon Dice Monsters"
authors = [
    {name = "Jumza"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.yugiohddm"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.yugiohddm.Constants.VERSION"}
