[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.yugiohddm"
version = "0.3.0"
description = "MultiWorld: Yu-Gi-Oh! Dungeon Dice Monsters"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Jumza"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.yugiohddm",]
namespaces = true
