[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.shapez"
version = "0.0.1"
description = "MultiWorld: shapez"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Slimey"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.shapez",]
namespaces = true
