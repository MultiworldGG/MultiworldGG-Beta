[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.shapez"
dynamic = ["version"]
description = "MultiWorld: shapez"
authors = [
    {name = "Slimey"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.shapez"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.shapez.Constants.VERSION"}
