[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.dkc2"
version = "3.0.5"
description = "MultiWorld: Donkey Kong Country 2"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "lx5"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.dkc2",]
namespaces = true
