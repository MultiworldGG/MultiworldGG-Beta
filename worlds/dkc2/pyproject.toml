[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.dkc2"
dynamic = ["version"]
description = "MultiWorld: Donkey Kong Country 2"
authors = [
    {name = "lx5"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.dkc2"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.dkc2.Constants.VERSION"}
