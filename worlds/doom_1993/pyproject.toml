[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.doom_1993"
dynamic = ["version"]
description = "MultiWorld: DOOM 1993"
authors = [
    {name = "Daivuk"},
    {name = "Kaito Sinclaire"}
]
license = "Zlib"
license-files = [
    "LICENSE"
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.doom_1993"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.doom_1993.Constants.VERSION"}
