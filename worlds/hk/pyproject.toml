[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.hk"
version = "1.0.1"
description = "MultiWorld: Hollow Knight"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "BadMagic"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.hk",]
namespaces = true
