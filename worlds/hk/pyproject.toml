[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.hk"
dynamic = ["version"]
description = "MultiWorld: Hollow Knight"
authors = [
    {name = "BadMagic"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.hk"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.hk.Constants.VERSION"}
