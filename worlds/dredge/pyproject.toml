[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.dredge"
version = "0.5.0"
description = "MultiWorld: Dredge"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Alextric"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.dredge",]
namespaces = true
