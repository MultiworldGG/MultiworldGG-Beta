[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.tyrian"
version = "0.0.0"
description = "MultiWorld: Tyrian"
license = "Zlib"
license-files = [ "LICENSE",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Kaito Sinclaire"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.tyrian",]
namespaces = true
