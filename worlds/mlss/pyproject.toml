[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.mlss"
version = "0.0.0"
description = "MultiWorld: Mario and Luigi Superstar Saga"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "jamesbrq"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.mlss",]
namespaces = true
