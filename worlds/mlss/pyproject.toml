[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.mlss"
dynamic = ["version"]
description = "MultiWorld: Mario and Luigi Superstar Saga"
authors = [
    {name = "jamesbrq"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.mlss"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.mlss.Constants.VERSION"}
