[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.lufia2ac"
dynamic = ["version"]
description = "MultiWorld: Lufia II: Ancient Cave"
authors = [
    {name = "el-u"},
    {name = "word_fcuk"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.lufia2ac"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.lufia2ac.Constants.VERSION"}
