[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.lufia2ac"
version = "0.0.1"
description = "MultiWorld: Lufia II: Ancient Cave"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "el-u"

[[project.authors]]
name = "word_fcuk"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.lufia2ac",]
namespaces = true
