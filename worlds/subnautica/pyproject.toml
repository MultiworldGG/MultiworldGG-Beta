[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.subnautica"
version = "0.5.2"
description = "MultiWorld: Subnautica"
license = "MIT"
license-files = [ "LICENSE",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Berserker66"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.subnautica",]
namespaces = true
