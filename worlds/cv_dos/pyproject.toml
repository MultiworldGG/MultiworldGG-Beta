[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.cv_dos"
version = "1.3.0"
description = "MultiWorld: Archipelago"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Pink Switch"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.cv_dos",]
namespaces = true
