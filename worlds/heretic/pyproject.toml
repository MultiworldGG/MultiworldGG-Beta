[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.heretic"
version = "0.5.2"
description = "MultiWorld: Heretic"
license = "Zlib"
license-files = [ "LICENSE",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Daivuk"

[[project.authors]]
name = "Kaito Sinclaire"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.heretic",]
namespaces = true
