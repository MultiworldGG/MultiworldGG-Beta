[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.hylics2"
dynamic = ["version"]
description = "MultiWorld: Hylics 2"
authors = [
    {name = "TRPG"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.hylics2"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.hylics2.Register.VERSION"}
