[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.hylics2"
version = "1.0.1"
description = "MultiWorld: Hylics 2"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "TRPG"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.hylics2",]
namespaces = true
