[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.peaks_of_yore"
dynamic = ["version"]
description = "MultiWorld: Peaks of Yore"
authors = [
    {name = "c0der23"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.peaks_of_yore"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.peaks_of_yore.Constants.VERSION"}
