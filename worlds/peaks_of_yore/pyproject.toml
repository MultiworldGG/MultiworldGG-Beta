[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.peaks_of_yore"
version = "0.0.1"
description = "MultiWorld: Peaks of Yore"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "c0der23"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.peaks_of_yore",]
namespaces = true
