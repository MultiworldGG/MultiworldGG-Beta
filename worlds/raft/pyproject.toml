[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.raft"
dynamic = ["version"]
description = "MultiWorld: Raft"
authors = [
    {name = "SunnyBat"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.raft"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.raft.Constants.VERSION"}
