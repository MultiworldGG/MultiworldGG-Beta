[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.raft"
version = "0.3.5"
description = "MultiWorld: Raft"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "SunnyBat"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.raft",]
namespaces = true
