[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.tracker"
dynamic = ["version"]
description = "MultiWorld: Universal Tracker"
authors = [
    {name = "Unknown"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"
[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.tracker"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.tracker.Constants.VERSION"}
