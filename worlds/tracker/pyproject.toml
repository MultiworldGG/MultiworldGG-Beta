[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.tracker"
version = "0.0.2"
description = "MultiWorld: Archipelago"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Faris"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.tracker",]
namespaces = true
