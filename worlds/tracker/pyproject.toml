[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.tracker"
version = "1.0.1"
description = "MultiWorld: Universal Tracker"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Unknown"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.tracker",]
namespaces = true
