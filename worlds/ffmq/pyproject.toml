[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.ffmq"
version = "0.0.0"
description = "MultiWorld: Final Fantasy Mystic Quest"
license = "MIT"
license-files = [ "LICENSE",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Alchav"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.ffmq",]
namespaces = true
