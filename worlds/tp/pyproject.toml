[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.tp"
dynamic = ["version"]
description = "MultiWorld: Twilight Princess"
authors = [
    {name = "WritingHusky"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.tp"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.tp.Constants.VERSION"}
