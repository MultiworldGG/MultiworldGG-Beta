[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.tp"
version = "0.3.1"
description = "MultiWorld: Twilight Princess"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "WritingHusky"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.tp",]
namespaces = true
