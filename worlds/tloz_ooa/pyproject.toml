[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.tloz_ooa"
version = "0.0.1"
description = "MultiWorld: The Legend of Zelda - Oracle of Ages"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Dinopony"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.tloz_ooa",]
namespaces = true
