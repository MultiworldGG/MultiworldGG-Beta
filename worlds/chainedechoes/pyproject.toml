[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.chainedechoes"
dynamic = ["version"]
description = "MultiWorld: Chained Echoes"
authors = [
    {name = "SergioAlonso"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.chainedechoes"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.chainedechoes.Register.VERSION"}
