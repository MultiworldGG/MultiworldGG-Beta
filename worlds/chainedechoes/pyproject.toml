[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.chainedechoes"
version = "0.0.1"
description = "MultiWorld: Chained Echoes"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "SergioAlonso"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.chainedechoes",]
namespaces = true
