[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.dsr"
version = "0.0.1"
description = "MultiWorld: Dark Souls Remastered"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "ArsonAssassin"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.dsr",]
namespaces = true
