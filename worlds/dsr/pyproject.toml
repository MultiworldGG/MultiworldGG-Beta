[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.dsr"
dynamic = ["version"]
description = "MultiWorld: Dark Souls Remastered"
authors = [
    {name = "ArsonAssassin"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.dsr"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.dsr.Register.VERSION"}
