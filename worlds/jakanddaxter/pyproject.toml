[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.jakanddaxter"
dynamic = ["version"]
description = "MultiWorld: Jak and Daxter: The Precursor Legacy"
authors = [
    {name = "massimilianodelliubaldini"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"
dependencies = [
    "Pymem>=1.13.0",
]

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.jakanddaxter"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.jakanddaxter.Constants.VERSION"}
