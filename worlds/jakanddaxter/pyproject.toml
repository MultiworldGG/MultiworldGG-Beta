[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.jakanddaxter"
version = "1.0.1"
description = "MultiWorld: Jak and Daxter: The Precursor Legacy"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
dependencies = [ "Pymem>=1.13.0",]
[[project.authors]]
name = "markustulliuscicero"

[project.entry-points."mwgg.client"]
"worlds.jakanddaxter.Client" = "worlds.jakanddaxter.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.jakanddaxter",]
namespaces = true
