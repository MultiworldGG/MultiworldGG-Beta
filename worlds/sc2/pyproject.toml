[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sc2"
dynamic = ["version"]
description = "MultiWorld: Starcraft 2"
authors = [
    {name = "Ziktofel"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"
dependencies = [
    "nest-asyncio >= 1.5.5",
    "s2clientprotocol>=5.0.11.90136.0"
    "mpyq>=0.2.5"
    "portpicker>=1.5.2"
    "aiohttp>=3.8.4"
    "loguru>=0.7.0"
    "protobuf==3.20.3"
]

[project.entry-points."mwgg.client"]
"worlds.sc2.Client" = "worlds.sc2.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.sc2"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.sc2.Constants.VERSION"}
