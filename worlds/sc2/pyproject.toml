[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sc2"
version = "4.0.2"
description = "MultiWorld: Starcraft 2"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
dependencies = [ "nest-asyncio >= 1.5.5", "s2clientprotocol>=5.0.11.90136.0", "mpyq>=0.2.5", "portpicker>=1.5.2", "aiohttp>=3.8.4", "loguru>=0.7.0", "protobuf==3.20.3",]
[[project.authors]]
name = "The Archipelago SC2 Team"

[project.entry-points."mwgg.client"]
"worlds.sc2.Client" = "worlds.sc2.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.sc2",]
namespaces = true
