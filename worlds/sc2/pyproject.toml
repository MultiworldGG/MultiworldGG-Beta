[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sc2"
dynamic = ["version"]
description = "MultiWorld: Starcraft 2"
authors = [
    {name = "Ziktofel"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"
dependencies = [
    "nest-asyncio >= 1.5.5",
]

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.sc2"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.sc2.Constants.VERSION"}
