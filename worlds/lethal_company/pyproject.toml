[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.lethal_company"
dynamic = ["version"]
description = "MultiWorld: Lethal Company"
authors = [
    {name = "T0r1nn"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.lethal_company"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.lethal_company.Constants.VERSION"}
