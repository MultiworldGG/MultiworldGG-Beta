[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.lethal_company"
version = "7.1"
description = "MultiWorld: Lethal Company"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "T0r1nn"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.lethal_company",]
namespaces = true
