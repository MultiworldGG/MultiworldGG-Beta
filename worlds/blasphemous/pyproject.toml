[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.blasphemous"
version = "0.0.1"
description = "MultiWorld: Blasphemous"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "TRPG"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.blasphemous",]
namespaces = true
