[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.stardew_valley"
dynamic = ["version"]
description = "MultiWorld: Stardew Valley"
authors = [
    {name = "Kaito Kid"},
    {name = "Jouramie"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[project.entry-points."mwgg.client"]
"worlds.stardew_valley.Client" = "worlds.stardew_valley.Register:CLIENT_FUNCTION"


[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.stardew_valley"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.stardew_valley.Register.VERSION"}
