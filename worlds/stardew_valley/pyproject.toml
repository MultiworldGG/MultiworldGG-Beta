[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.stardew_valley"
version = "1.0.1"
description = "MultiWorld: Stardew Valley"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Kaito Kid"

[[project.authors]]
name = "Jouramie"

[project.entry-points."mwgg.client"]
"worlds.stardew_valley.Client" = "worlds.stardew_valley.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.stardew_valley",]
namespaces = true
