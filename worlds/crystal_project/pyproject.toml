[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.crystal_project"
dynamic = ["version"]
description = "MultiWorld: Crystal Project"
authors = [
    {name = "Emerassi"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.crystal_project"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.crystal_project.Constants.VERSION"}
