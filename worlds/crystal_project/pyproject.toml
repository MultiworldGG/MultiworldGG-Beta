[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.crystal_project"
version = "0.11.4"
description = "MultiWorld: Crystal Project"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Dragons"

[[project.authors]]
name = "Rabbits"

[[project.authors]]
name = "FabulaFey"

[[project.authors]]
name = "Emerassi"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.crystal_project",]
namespaces = true
