[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.crosscode"
version = "0.5.2"
description = "MultiWorld: CrossCode"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "CodeTriangle"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.crosscode",]
namespaces = true
