[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.crosscode"
dynamic = ["version"]
description = "MultiWorld: CrossCode"
authors = [
    {name = "CodeTriangle"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.crosscode"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.crosscode.Register.VERSION"}
