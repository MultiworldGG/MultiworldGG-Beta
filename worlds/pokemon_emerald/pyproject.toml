[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.pokemon_emerald"
version = "2.4.2"
description = "MultiWorld: Pokemon Emerald"
license = "MIT"
license-files = [ "LICENSE",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Zunawe"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.pokemon_emerald",]
namespaces = true
