[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.yugioh06"
version = "1.0.1"
description = "MultiWorld: Yu-Gi-Oh! 2006"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Rensen3"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.yugioh06",]
namespaces = true
