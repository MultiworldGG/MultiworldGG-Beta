[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.nine_sols"
version = "0.2.2"
description = "MultiWorld: Nine Sols"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Ixrec"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.nine_sols",]
namespaces = true
