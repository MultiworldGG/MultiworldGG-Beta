[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.checksfinder"
dynamic = ["version"]
description = "MultiWorld: ChecksFinder"
authors = [
    {name = "SunCatMC"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[project.entry-points."mwgg.client"]
checksfinder.Client = "checksfinder.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.checksfinder"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.checksfinder.Constants.VERSION"}
