[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.checksfinder"
version = "0.0.0"
description = "MultiWorld: ChecksFinder"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "SunCatMC"

[project.entry-points."mwgg.client"]
"worlds.checksfinder.Client" = "worlds.checksfinder.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.checksfinder",]
namespaces = true
