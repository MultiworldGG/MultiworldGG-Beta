[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.mzm"
version = "0.0.1"
description = "MultiWorld: Metroid Zero Mission"
license = "MIT"
license-files = [ "LICENSE",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Noise"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.mzm",]
namespaces = true
