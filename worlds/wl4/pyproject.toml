[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.wl4"
dynamic = ["version"]
description = "MultiWorld: Wario Land 4"
authors = [
    {name = "lil David"}
]
license = "MIT"
license-files = [
    "LICENSE"
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.wl4"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.wl4.Constants.VERSION"}
