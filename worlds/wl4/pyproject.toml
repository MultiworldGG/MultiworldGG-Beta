[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.wl4"
version = "0.0.0"
description = "MultiWorld: Wario Land 4"
license = "MIT"
license-files = [ "LICENSE",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "lil David"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.wl4",]
namespaces = true
