[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.diddy_kong_racing"
dynamic = ["version"]
description = "MultiWorld: Diddy Kong Racing"
authors = [
    {name = "zakwiz"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[project.entry-points."mwgg.client"]
"worlds.diddy_kong_racing.Client" = "worlds.diddy_kong_racing.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.diddy_kong_racing"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.diddy_kong_racing.Register.VERSION"}
