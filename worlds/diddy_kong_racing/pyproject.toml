[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.diddy_kong_racing"
version = "0.6.3"
description = "MultiWorld: Diddy Kong Racing"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "zakwiz"

[project.entry-points."mwgg.client"]
"worlds.diddy_kong_racing.Client" = "worlds.diddy_kong_racing.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.diddy_kong_racing",]
namespaces = true
