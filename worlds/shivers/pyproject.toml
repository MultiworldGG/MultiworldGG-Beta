[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.shivers"
dynamic = ["version"]
description = "MultiWorld: Shivers"
authors = [
    {name = "GodlFire"},
    {name = "korydondzila"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.shivers"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.shivers.Register.VERSION"}
