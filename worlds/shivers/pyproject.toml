[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.shivers"
version = "0.0.1"
description = "MultiWorld: Shivers"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "GodlFire"

[[project.authors]]
name = "korydondzila"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.shivers",]
namespaces = true
