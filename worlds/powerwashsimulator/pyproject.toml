[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.powerwashsimulator"
dynamic = ["version"]
description = "MultiWorld: Powerwash Simulator"
authors = [
    {name = "SW_CreeperKing"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.powerwashsimulator"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.powerwashsimulator.Constants.VERSION"}
