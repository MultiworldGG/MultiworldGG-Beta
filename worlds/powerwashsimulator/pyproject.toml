[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.powerwashsimulator"
version = "0.0.0"
description = "MultiWorld: Powerwash Simulator"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "SW_CreeperKing"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.powerwashsimulator",]
namespaces = true
