[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.toontown"
version = "0.6.4"
description = "MultiWorld: Toontown"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "DevvyDont"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.toontown",]
namespaces = true
