[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.toontown"
dynamic = ["version"]
description = "MultiWorld: Toontown"
authors = [
    {name = "DevvyDont"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.toontown"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.toontown.Register.VERSION"}
