[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.faxanadu"
dynamic = ["version"]
description = "MultiWorld: Faxanadu"
authors = [
    {name = "Daivuk"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.faxanadu"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.faxanadu.Constants.VERSION"}
