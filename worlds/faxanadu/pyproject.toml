[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.faxanadu"
version = "0.3.1"
description = "MultiWorld: Faxanadu"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Daivuk"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.faxanadu",]
namespaces = true
