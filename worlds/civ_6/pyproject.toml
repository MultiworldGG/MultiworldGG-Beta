[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.civ_6"
dynamic = ["version"]
description = "MultiWorld: Civilization VI"
authors = [
    {name = "hesto2"}
]
license = "MIT"
license-files = [
    "LICENSE.md"
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[project.entry-points."mwgg.client"]
"worlds.civ_6.Client" = "worlds.civ_6.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.civ_6"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.civ_6.Constants.VERSION"}
