[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.civ_6"
version = "0.0.1"
description = "MultiWorld: Civilization VI"
license = "MIT"
license-files = [ "LICENSE.md",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "hesto2"

[project.entry-points."mwgg.client"]
"worlds.civ_6.Client" = "worlds.civ_6.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.civ_6",]
namespaces = true
