[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.mm2"
version = "0.3.4"
description = "MultiWorld: Mega Man 2"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Silvris"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.mm2",]
namespaces = true
