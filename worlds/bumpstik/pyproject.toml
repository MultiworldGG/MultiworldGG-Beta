[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.bumpstik"
dynamic = ["version"]
description = "MultiWorld: Bumper Stickers"
authors = [
    {name = "FelicitusNeko"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.bumpstik"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.bumpstik.Constants.VERSION"}
