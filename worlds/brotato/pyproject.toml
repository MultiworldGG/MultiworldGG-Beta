[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.brotato"
version = "0.12.1"
description = "MultiWorld: Brotato"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Rampaging Hippy"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.brotato",]
namespaces = true
