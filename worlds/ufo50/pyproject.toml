[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.ufo50"
version = "1.0.1"
description = "MultiWorld: UFO 50"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "LeonarthCG"

[[project.authors]]
name = "ScipioWright"

[project.entry-points."mwgg.client"]
"worlds.ufo50.Client" = "worlds.ufo50.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.ufo50",]
namespaces = true
