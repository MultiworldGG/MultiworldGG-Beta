[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.ufo50"
dynamic = ["version"]
description = "MultiWorld: UFO 50"
authors = [
    {name = "LeonarthCG"},
    {name = "ScipioWright"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[project.entry-points."mwgg.client"]
ufo50.Client = "ufo50.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.ufo50"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.ufo50.Constants.VERSION"}
