[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.fm"
version = "0.0.0"
description = "MultiWorld: Yu-Gi-Oh! Forbidden Memories"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "sg4e"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.fm",]
namespaces = true
