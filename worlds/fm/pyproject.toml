[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.fm"
dynamic = ["version"]
description = "MultiWorld: Yu-Gi-Oh! Forbidden Memories"
authors = [
    {name = "sg4e"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.fm"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.fm.Constants.VERSION"}
