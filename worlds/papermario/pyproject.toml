[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.papermario"
dynamic = ["version"]
description = "MultiWorld: Paper Mario"
authors = [
    {name = "JKB"}
]
license = "MIT"
license-files = [
    "LICENSE"
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.papermario"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.papermario.Constants.VERSION"}
