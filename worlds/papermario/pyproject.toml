[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.papermario"
version = "0.0.1"
description = "MultiWorld: Paper Mario"
license = "MIT"
license-files = [ "LICENSE",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "JKB"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.papermario",]
namespaces = true
