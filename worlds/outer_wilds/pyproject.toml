[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.outer_wilds"
version = "0.3.19"
description = "MultiWorld: Outer Wilds"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Ixrec"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.outer_wilds",]
namespaces = true
