[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.outer_wilds"
dynamic = ["version"]
description = "MultiWorld: Outer Wilds"
authors = [
    {name = "Ixrec"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.outer_wilds"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.outer_wilds.Register.VERSION"}
