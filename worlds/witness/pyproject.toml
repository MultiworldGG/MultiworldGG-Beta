[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.witness"
dynamic = ["version"]
description = "MultiWorld: The Witness"
authors = [
    {name = "NewSoupVi"},
    {name = "blastron"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.witness"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.witness.Constants.VERSION"}
