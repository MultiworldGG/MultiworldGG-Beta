[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.witness"
version = "8.0.1"
description = "MultiWorld: The Witness"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "NewSoupVi"

[[project.authors]]
name = "blastron"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.witness",]
namespaces = true
