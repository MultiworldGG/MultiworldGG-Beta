[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.zelda2"
version = "0.0.1"
description = "MultiWorld: Zelda II: The Adventure of Link"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Pink Switch"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.zelda2",]
namespaces = true
