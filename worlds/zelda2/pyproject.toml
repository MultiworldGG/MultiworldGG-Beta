[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.zelda2"
dynamic = ["version"]
description = "MultiWorld: Zelda II: The Adventure of Link"
authors = [
    {name = "Pink Switch"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.zelda2"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.zelda2.Register.VERSION"}
