[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.cv64"
dynamic = ["version"]
description = "MultiWorld: Castlevania 64"
authors = [
    {name = "LiquidCat64"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.cv64"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.cv64.Constants.VERSION"}
