[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.cv64"
version = "0.0.1"
description = "MultiWorld: Castlevania 64"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "LiquidCat64"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.cv64",]
namespaces = true
