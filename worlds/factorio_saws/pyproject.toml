[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.factorio_saws"
version = "0.0.0"
description = "MultiWorld: Factorio Space Age Without Space"
license = "MIT"
license-files = [ "LICENSE",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
dependencies = [ "factorio-rcon-py>=2.1.2",]
[[project.authors]]
name = "Alchav"

[[project.authors]]
name = "Berserker66"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.factorio_saws",]
namespaces = true
