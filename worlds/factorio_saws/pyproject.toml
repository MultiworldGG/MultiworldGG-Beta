[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.factorio_saws"
dynamic = ["version"]
description = "MultiWorld: Factorio Space Age Without Space"
authors = [
    {name = "Alchav"},
    {name = "Berserker66"}
]
license = "MIT"
license-files = [
    "LICENSE"
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"
dependencies = [
    "factorio-rcon-py>=2.1.2",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.factorio_saws"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.factorio_saws.Register.VERSION"}
