[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.mmx3"
version = "0.0.0"
description = "MultiWorld: Mega Man X3"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "lx5"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.mmx3",]
namespaces = true
