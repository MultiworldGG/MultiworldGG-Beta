[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.mmx3"
dynamic = ["version"]
description = "MultiWorld: Mega Man X3"
authors = [
    {name = "lx5"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.mmx3"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.mmx3.Register.VERSION"}
