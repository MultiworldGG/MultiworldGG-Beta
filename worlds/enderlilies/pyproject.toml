[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.enderlilies"
dynamic = ["version"]
description = "MultiWorld: Ender Lilies"
authors = [
    {name = "Trexounay"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.enderlilies"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.enderlilies.Register.VERSION"}
