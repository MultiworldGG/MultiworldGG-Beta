[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.enderlilies"
version = "0.0.1"
description = "MultiWorld: Ender Lilies"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Trexounay"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.enderlilies",]
namespaces = true
