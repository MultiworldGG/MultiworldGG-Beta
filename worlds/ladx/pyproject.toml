[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.ladx"
dynamic = ["version"]
description = "MultiWorld: Link's Awakening DX Beta"
authors = [
    {name = "threeandthree"}
]
license = "MIT"
license-files = [
    "LADXR/LADXR_LICENSE"
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"
[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.ladx"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.ladx.Constants.VERSION"}
