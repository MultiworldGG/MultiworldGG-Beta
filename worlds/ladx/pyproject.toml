[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.ladx"
version = "12.5.0"
description = "MultiWorld: Link's Awakening DX Beta"
license = "MIT"
license-files = [ "LADXR/LADXR_LICENSE",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "threeandthree"

[project.entry-points."mwgg.client"]
"worlds.ladx.Client" = "worlds.ladx.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.ladx",]
namespaces = true
