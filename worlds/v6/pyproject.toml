[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.v6"
version = "1.0.1"
description = "MultiWorld: VVVVVV"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "N00byKing"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.v6",]
namespaces = true
