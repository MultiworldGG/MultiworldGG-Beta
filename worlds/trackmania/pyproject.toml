[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.trackmania"
version = "1.3.1"
description = "MultiWorld: Trackmania"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "SerialBoxes"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.trackmania",]
namespaces = true
