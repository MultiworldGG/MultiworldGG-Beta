[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.hades"
dynamic = ["version"]
description = "MultiWorld: Hades"
authors = [
    {name = "Naix"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[project.entry-points."mwgg.client"]
"worlds.hades.Client" = "worlds.hades.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.hades"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.hades.Constants.VERSION"}
