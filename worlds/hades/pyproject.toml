[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.hades"
version = "0.5.1"
description = "MultiWorld: Hades"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Naix"

[project.entry-points."mwgg.client"]
"worlds.hades.Client" = "worlds.hades.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.hades",]
namespaces = true
