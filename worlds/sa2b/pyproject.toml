[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sa2b"
version = "2.4.3"
description = "MultiWorld: Sonic Adventure 2 Battle"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "PoryGone"

[[project.authors]]
name = "RaspberrySpaceJam"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.sa2b",]
namespaces = true
