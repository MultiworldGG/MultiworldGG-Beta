[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sa2b"
dynamic = ["version"]
description = "MultiWorld: Sonic Adventure 2 Battle"
authors = [
    {name = "PoryGone"},
    {name = "RaspberrySpace"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.sa2b"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.sa2b.Constants.VERSION"}
