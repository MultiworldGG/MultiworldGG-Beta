[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.tloz_oos"
dynamic = ["version"]
description = "MultiWorld: The Legend of Zelda - Oracle of Seasons"
authors = [
    {name = "Dinopony"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.tloz_oos"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.tloz_oos.Constants.VERSION"}
