[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.tloz_oos"
version = "0.0.0"
description = "MultiWorld: The Legend of Zelda - Oracle of Seasons"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Dinopony"

[[project.authors]]
name = "Ishigh"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.tloz_oos",]
namespaces = true
