[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.residentevil2remake"
dynamic = ["version"]
description = "MultiWorld: Resident Evil 2 Remake"
authors = [
    {name = "Fuzzy"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.residentevil2remake"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.residentevil2remake.Register.VERSION"}
