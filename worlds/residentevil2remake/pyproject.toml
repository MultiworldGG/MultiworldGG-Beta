[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.residentevil2remake"
version = "0.2.9"
description = "MultiWorld: Resident Evil 2 Remake"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Fuzzy"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.residentevil2remake",]
namespaces = true
