[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.seaofthieves"
dynamic = ["version"]
description = "MultiWorld: Sea of Thieves"
authors = [
    {name = "EthanTheEpic"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.seaofthieves"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.seaofthieves.Constants.VERSION"}
