[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.seaofthieves"
version = "0.0.1"
description = "MultiWorld: Sea of Thieves"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "EthanTheEpic"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.seaofthieves",]
namespaces = true
