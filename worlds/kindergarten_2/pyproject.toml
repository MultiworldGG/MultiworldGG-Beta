[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.kindergarten_2"
version = "0.0.2"
description = "MultiWorld: Kindergarten 2"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Kaito Kid"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.kindergarten_2",]
namespaces = true
