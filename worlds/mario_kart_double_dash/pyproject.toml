[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.mario_kart_double_dash"
version = "0.0.0"
description = "MultiWorld: Mario Kart Double Dash"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "aXu"

[project.entry-points."mwgg.client"]
"worlds.mario_kart_double_dash.Client" = "worlds.mario_kart_double_dash.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.mario_kart_double_dash",]
namespaces = true
