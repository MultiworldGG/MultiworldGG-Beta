[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.mario_kart_double_dash"
dynamic = ["version"]
description = "MultiWorld: Mario Kart Double Dash"
authors = [
    {name = "aXu"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[project.entry-points."mwgg.client"]
"worlds.mario_kart_double_dash.Client" = "worlds.mario_kart_double_dash.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.mario_kart_double_dash"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.mario_kart_double_dash.Constants.VERSION"}
