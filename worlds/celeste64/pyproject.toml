[project]
name = "worlds.celeste64"
dynamic = ["version"]
description = "MultiWorld: Celeste 64"
authors = [
    {name = "PoryGone"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.celeste64"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.celeste64.Constants.VERSION"}
