[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.celeste64"
version = "1.3.1"
description = "MultiWorld: Celeste 64"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "PoryGone"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.celeste64",]
namespaces = true
