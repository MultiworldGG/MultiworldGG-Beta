[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.swr"
dynamic = ["version"]
description = "MultiWorld: Star Wars Episode I Racer"
authors = [
    {name = "Johnny Hamcobbler"}
]
license = "MIT"
license-files = [
    "LICENSE"
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.swr"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.swr.Register.VERSION"}
