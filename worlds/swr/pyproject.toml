[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.swr"
version = "0.0.1"
description = "MultiWorld: Star Wars Episode I Racer"
license = "MIT"
license-files = [ "LICENSE",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Johnny Hamcobbler"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.swr",]
namespaces = true
