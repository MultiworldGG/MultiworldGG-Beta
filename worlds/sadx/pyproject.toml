[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sadx"
version = "0.0.0"
description = "MultiWorld: Sonic Adventure DX"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Classic"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.sadx",]
namespaces = true
