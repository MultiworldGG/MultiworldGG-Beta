[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sadx"
dynamic = ["version"]
description = "MultiWorld: Sonic Adventure DX"
authors = [
    {name = "Classic"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.sadx"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.sadx.Constants.VERSION"}
