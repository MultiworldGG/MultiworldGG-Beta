[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.meritous"
version = "1.0.1"
description = "MultiWorld: Meritous"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "FelicitusNeko"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.meritous",]
namespaces = true
