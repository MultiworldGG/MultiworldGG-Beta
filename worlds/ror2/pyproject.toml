[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.ror2"
version = "0.0.0"
description = "MultiWorld: Risk of Rain 2"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Sneaki"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.ror2",]
namespaces = true
