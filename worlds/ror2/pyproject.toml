[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.ror2"
dynamic = ["version"]
description = "MultiWorld: Risk of Rain 2"
authors = [
    {name = "Sneaki"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.ror2"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.ror2.Constants.VERSION"}
