[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.gstla"
version = "0.2.2"
description = "MultiWorld: Golden Sun The Lost Age"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
dependencies = [ "requests >= 2.28.2",]
[[project.authors]]
name = "Dragion"

[[project.authors]]
name = "Platano Bailando"

[[project.authors]]
name = "Karanum"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.gstla",]
namespaces = true
