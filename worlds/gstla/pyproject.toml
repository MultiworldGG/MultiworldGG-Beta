[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.gstla"
dynamic = ["version"]
description = "MultiWorld: Golden Sun The Lost Age"
authors = [
    {name = "Dragion"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"
dependencies = [
    "requests >= 2.28.2",
]

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.gstla"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.gstla.Constants.VERSION"}
