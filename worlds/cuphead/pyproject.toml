[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.cuphead"
dynamic = ["version"]
description = "MultiWorld: Cuphead"
authors = [
    {name = "JKL"}
]
license = "MIT"
license-files = [
    "LICENSE.md"
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.cuphead"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.cuphead.Constants.VERSION"}
