[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.cuphead"
version = "0.2.1"
description = "MultiWorld: Cuphead"
license = "MIT"
license-files = [ "LICENSE.md",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "JKL"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.cuphead",]
namespaces = true
