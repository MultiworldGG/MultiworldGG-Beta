[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.mmbn3"
dynamic = ["version"]
description = "MultiWorld: MegaMan Battle Network 3"
authors = [
    {name = "digiholic"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[project.entry-points."mwgg.client"]
"worlds.mmbn3.Client" = "worlds.mmbn3.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.mmbn3"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.mmbn3.Register.VERSION"}
