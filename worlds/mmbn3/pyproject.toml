[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.mmbn3"
version = "0.0.1"
description = "MultiWorld: MegaMan Battle Network 3"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "digiholic"

[project.entry-points."mwgg.client"]
"worlds.mmbn3.Client" = "worlds.mmbn3.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.mmbn3",]
namespaces = true
