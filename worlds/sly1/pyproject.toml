[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sly1"
dynamic = ["version"]
description = "MultiWorld: Sly Cooper and the Thievius Raccoonus"
authors = [
    {name = "Philiard"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[project.entry-points."mwgg.client"]
sly1.Client = "sly1.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.sly1"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.sly1.Constants.VERSION"}
