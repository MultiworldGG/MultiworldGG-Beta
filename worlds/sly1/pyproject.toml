[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sly1"
version = "0.0.1"
description = "MultiWorld: Sly Cooper and the Thievius Raccoonus"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Philiard"

[project.entry-points."mwgg.client"]
"worlds.sly1.Client" = "worlds.sly1.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.sly1",]
namespaces = true
