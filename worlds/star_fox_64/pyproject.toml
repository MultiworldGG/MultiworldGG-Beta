[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.star_fox_64"
version = "0.0.0"
description = "MultiWorld: Star Fox 64"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Austin"

[project.entry-points."mwgg.client"]
"worlds.star_fox_64.Client" = "worlds.star_fox_64.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.star_fox_64",]
namespaces = true
