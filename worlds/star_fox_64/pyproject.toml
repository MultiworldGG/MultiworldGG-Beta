[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.star_fox_64"
dynamic = ["version"]
description = "MultiWorld: Star Fox 64"
authors = [
    {name = "Austin"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.star_fox_64"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.star_fox_64.Constants.VERSION"}
