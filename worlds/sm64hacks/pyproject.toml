[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sm64hacks"
dynamic = ["version"]
description = "MultiWorld: SM64 Romhack"
authors = [
    {name = "DNVIC"}
]
license = "MIT"
license-files = [
    "LICENSE"
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.sm64hacks"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.sm64hacks.Register.VERSION"}
