[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sm64hacks"
version = "0.0.1"
description = "MultiWorld: SM64 Romhack"
license = "MIT"
license-files = [ "LICENSE",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "DNVIC"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.sm64hacks",]
namespaces = true
