[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.oribf"
dynamic = ["version"]
description = "MultiWorld: Ori and the Blind Forest"
authors = [
    {name = "Gray"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.oribf"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.oribf.Register.VERSION"}
