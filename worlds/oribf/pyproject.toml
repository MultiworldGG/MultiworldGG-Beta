[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.oribf"
version = "0.0.0"
description = "MultiWorld: Ori and the Blind Forest"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Gray"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.oribf",]
namespaces = true
