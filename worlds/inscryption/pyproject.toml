[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.inscryption"
version = "1.0.1"
description = "MultiWorld: Inscryption"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "DrBibop"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.inscryption",]
namespaces = true
