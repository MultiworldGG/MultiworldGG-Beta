[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.inscryption"
dynamic = ["version"]
description = "MultiWorld: Inscryption"
authors = [
    {name = "DrBibop"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.inscryption"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.inscryption.Register.VERSION"}
