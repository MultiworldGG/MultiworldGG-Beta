[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.yoshisisland"
version = "1.0.1"
description = "MultiWorld: Yoshi's Island"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Pink Switch"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.yoshisisland",]
namespaces = true
