[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.dark_souls_3"
dynamic = ["version"]
description = "MultiWorld: Dark Souls III"
authors = [
    {name = "Marech"},
    {name = "nex3"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.dark_souls_3"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.dark_souls_3.Constants.VERSION"}
