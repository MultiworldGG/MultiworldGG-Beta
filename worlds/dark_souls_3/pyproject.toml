[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.dark_souls_3"
version = "0.0.0"
description = "MultiWorld: Dark Souls III"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Marech"

[[project.authors]]
name = "nex3"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.dark_souls_3",]
namespaces = true
