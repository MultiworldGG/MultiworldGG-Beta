[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.pokemon_crystal"
version = "5.0.4"
description = "MultiWorld: Pokemon Crystal"
license = "MIT"
license-files = [ "LICENSE",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "James"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.pokemon_crystal",]
namespaces = true
