[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.pokemon_crystal"
dynamic = ["version"]
description = "MultiWorld: Pokemon Crystal"
authors = [
    {name = "James"}
]
license = "MIT"
license-files = [
    "LICENSE"
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.pokemon_crystal"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.pokemon_crystal.Constants.VERSION"}
