[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.getting_over_it"
dynamic = ["version"]
description = "MultiWorld: Getting Over It"
authors = [
    {name = "Slimey"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.getting_over_it"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.getting_over_it.Register.VERSION"}
