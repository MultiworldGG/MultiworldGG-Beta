[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.saving_princess"
dynamic = ["version"]
description = "MultiWorld: Saving Princess"
authors = [
    {name = "LeonarthCG"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[project.entry-points."mwgg.client"]
"worlds.saving_princess.Client" = "worlds.saving_princess.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.saving_princess"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.saving_princess.Constants.VERSION"}
