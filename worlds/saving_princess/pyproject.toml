[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.saving_princess"
version = "0.0.0"
description = "MultiWorld: Saving Princess"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "LeonarthCG"

[project.entry-points."mwgg.client"]
"worlds.saving_princess.Client" = "worlds.saving_princess.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.saving_princess",]
namespaces = true
