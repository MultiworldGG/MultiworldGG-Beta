[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.luigismansion"
version = "0.4.11"
description = "MultiWorld: Luigi's Mansion"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
dependencies = [ "gclib[speedups] @ git+https://github.com/LagoLunatic/gclib.git@4ddebd0a9717dca67684fe1cc55a86da9265e6b7",]
[[project.authors]]
name = "BootsinSoots"

[project.entry-points."mwgg.client"]
"worlds.luigismansion.Client" = "worlds.luigismansion.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.luigismansion",]
namespaces = true
