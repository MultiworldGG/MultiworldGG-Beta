[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.refunct"
version = "0.3.2"
description = "MultiWorld: Archipelago"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Spineraks"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.refunct",]
namespaces = true
