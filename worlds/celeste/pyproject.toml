[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.celeste"
version = "0.0.0"
description = "MultiWorld: Celeste"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
dependencies = [ "pandas>=2.0.3", "openpyxl>=3.1.2",]
[[project.authors]]
name = "doshyw"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.celeste",]
namespaces = true
