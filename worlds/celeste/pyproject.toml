[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.celeste"
dynamic = ["version"]
description = "MultiWorld: Celeste"
authors = [
    {name = "doshyw"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"
dependencies = [
    "pandas>=2.0.3",
    "openpyxl>=3.1.2",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.celeste"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.celeste.Constants.VERSION"}
