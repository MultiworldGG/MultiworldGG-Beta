[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.satisfactory"
version = "2.2.0"
description = "MultiWorld: Satisfactory"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Jarno"

[[project.authors]]
name = "Robb"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.satisfactory",]
namespaces = true
