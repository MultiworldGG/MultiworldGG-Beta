[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sm"
dynamic = ["version"]
description = "MultiWorld: Super Metroid"
authors = [
    {name = "lordlou"}
]
license = "MIT AND (GPL-2.0-only)"
license-files = [
    "variaRandomizer/LICENSE",
    "variaRandomizer/patches/ips.pl"
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.sm"]
exclude = ["sm_*", "sm6*", "smo*", "sms*", "smw*", "smz*", "*test*", "test*"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.sm.Constants.VERSION"}
