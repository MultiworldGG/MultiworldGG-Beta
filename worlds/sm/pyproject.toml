[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sm"
version = "0.0.2"
description = "MultiWorld: Super Metroid"
license = "MIT AND (GPL-2.0-only)"
license-files = [ "variaRandomizer/LICENSE", "variaRandomizer/patches/ips.pl",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "lordlou"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.sm",]
exclude = [ "sm_*", "sm6*", "smo*", "sms*", "smw*", "smz*", "*test*", "test*",]
namespaces = true
