[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.rogue_legacy"
dynamic = ["version"]
description = "MultiWorld: Rogue Legacy"
authors = [
    {name = "Phar"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.rogue_legacy"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.rogue_legacy.Register.VERSION"}
