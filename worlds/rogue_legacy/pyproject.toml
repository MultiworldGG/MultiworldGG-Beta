[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.rogue_legacy"
version = "0.3.6"
description = "MultiWorld: Rogue Legacy"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Phar"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.rogue_legacy",]
namespaces = true
