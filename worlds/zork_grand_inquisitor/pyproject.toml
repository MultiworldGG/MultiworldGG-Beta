[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.zork_grand_inquisitor"
dynamic = ["version"]
description = "MultiWorld: Zork Grand Inquisitor"
authors = [
    {name = "nbrochu"}
]
license = "MIT"
license-files = [
    "LICENSE"
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"
dependencies = [
    "Pymem>=1.13.0",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.zork_grand_inquisitor"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.zork_grand_inquisitor.Register.VERSION"}
