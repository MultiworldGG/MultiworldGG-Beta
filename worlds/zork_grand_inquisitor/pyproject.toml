[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.zork_grand_inquisitor"
version = "2.0.6"
description = "MultiWorld: Zork Grand Inquisitor"
license = "MIT"
license-files = [ "LICENSE",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
dependencies = [ "Pymem>=1.13.0",]
[[project.authors]]
name = "SerpentAI"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.zork_grand_inquisitor",]
namespaces = true
