[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.kdl3"
dynamic = ["version"]
description = "MultiWorld: Kirby's Dream Land 3"
authors = [
    {name = "Silvris"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.kdl3"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.kdl3.Constants.VERSION"}
