[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.kdl3"
version = "0.0.1"
description = "MultiWorld: Kirby's Dream Land 3"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Silvris"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.kdl3",]
namespaces = true
