[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.oot"
dynamic = ["version"]
description = "MultiWorld: Ocarina of Time"
authors = [
    {name = "espeon65536 (currenty unmaintained)"}
]
license = "MIT AND (GPL-2.0-or-later)"
license-files = [
    "LICENSE",
    "data/Compress/src/crc.c",
    "data/Decompress/src/crc.c"
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[project.entry-points."mwgg.client"]
"worlds.oot.Client" = "worlds.oot.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.oot"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.oot.Constants.VERSION"}
