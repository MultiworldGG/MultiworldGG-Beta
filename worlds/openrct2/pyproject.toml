[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.openrct2"
dynamic = ["version"]
description = "MultiWorld: OpenRCT2"
authors = [
    {name = "Crazycolbster"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[project.entry-points."mwgg.client"]
"worlds.openrct2.Client" = "worlds.openrct2.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.openrct2"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.openrct2.Register.VERSION"}
