[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.openrct2"
version = "v0.1.20-beta"
description = "MultiWorld: OpenRCT2"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Crazycolbster"

[project.entry-points."mwgg.client"]
"worlds.openrct2.Client" = "worlds.openrct2.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.openrct2",]
namespaces = true
