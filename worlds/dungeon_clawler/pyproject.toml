[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.dungeon_clawler"
dynamic = ["version"]
description = "MultiWorld: Dungeon Clawler"
authors = [
    {name = "Kaito Kid"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.dungeon_clawler"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.dungeon_clawler.Constants.VERSION"}
