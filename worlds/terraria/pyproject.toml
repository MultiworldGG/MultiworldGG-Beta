[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.terraria"
version = "0.0.0"
description = "MultiWorld: Terraria"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Seldom-SE"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.terraria",]
namespaces = true
