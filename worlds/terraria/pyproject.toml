[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.terraria"
dynamic = ["version"]
description = "MultiWorld: Terraria"
authors = [
    {name = "Seldom-SE"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.terraria"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.terraria.Register.VERSION"}
