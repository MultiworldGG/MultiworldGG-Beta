[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.cccharles"
dynamic = ["version"]
description = "MultiWorld: Choo-Choo Charles"
authors = [
    {name = "Yaranorgoth"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.cccharles"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.cccharles.Register.VERSION"}
