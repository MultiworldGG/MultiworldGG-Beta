[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.cccharles"
version = "0.0.1"
description = "MultiWorld: Choo-Choo Charles"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Yaranorgoth"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.cccharles",]
namespaces = true
