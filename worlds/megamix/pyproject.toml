[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.megamix"
version = "1.0.1"
description = "MultiWorld: Hatsune Miku Project Diva Mega Mix+"
license = "MIT"
license-files = [ "LICENSE",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Cynichill"

[project.entry-points."mwgg.client"]
"worlds.megamix.Client" = "worlds.megamix.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.megamix",]
namespaces = true
