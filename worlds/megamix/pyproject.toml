[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.megamix"
dynamic = ["version"]
description = "MultiWorld: Hatsune Miku Project Diva Mega Mix+"
authors = [
    {name = "Cynichill"}
]
license = "MIT"
license-files = [
    "LICENSE"
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[project.entry-points."mwgg.client"]
megamix.Client = "megamix.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.megamix"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.megamix.Constants.VERSION"}
