[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.tunic"
dynamic = ["version"]
description = "MultiWorld: TUNIC"
authors = [
    {name = "SilentSR"},
    {name = "ScipioWright"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.tunic"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.tunic.Constants.VERSION"}
