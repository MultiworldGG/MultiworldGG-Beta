[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.tunic"
version = "4.2.7"
description = "MultiWorld: Archipelago"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "silent-destroyer"

[[project.authors]]
name = "ScipioWright"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.tunic",]
namespaces = true
