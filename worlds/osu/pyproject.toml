[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.osu"
dynamic = ["version"]
description = "MultiWorld: osu!"
authors = [
    {name = "Kanave"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"
dependencies = [
    "orjson>=3.9.10",
    "requests~=2.32.3",
]

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.osu"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.osu.Constants.VERSION"}
