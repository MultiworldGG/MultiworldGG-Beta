[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.osu"
version = "0.0.0"
description = "MultiWorld: osu!"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
dependencies = [ "orjson>=3.9.10", "requests~=2.32.3",]
[[project.authors]]
name = "Kanave"

[project.entry-points."mwgg.client"]
"worlds.osu.Client" = "worlds.osu.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.osu",]
namespaces = true
