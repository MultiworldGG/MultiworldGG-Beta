[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.cat_quest"
dynamic = ["version"]
description = "MultiWorld: Cat Quest"
authors = [
    {name = "Nikkilite"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.cat_quest"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.cat_quest.Register.VERSION"}
