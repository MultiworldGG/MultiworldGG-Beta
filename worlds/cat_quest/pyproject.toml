[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.cat_quest"
version = "0.0.1"
description = "MultiWorld: Cat Quest"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Nikkilite"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.cat_quest",]
namespaces = true
