[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.lingo"
dynamic = ["version"]
description = "MultiWorld: Lingo"
authors = [
    {name = "hatkirby"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.lingo"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.lingo.Constants.VERSION"}
