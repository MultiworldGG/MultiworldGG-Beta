[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.tloz"
dynamic = ["version"]
description = "MultiWorld: The Legend of Zelda"
authors = [
    {name = "Rosalie-A"},
    {name = "t3hf1gm3nt"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"
dependencies = [
    "bsdiff4>=1.2.2"
]

[project.entry-points."mwgg.client"]
tloz.Client = "tloz.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.tloz"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.tloz.Constants.VERSION"}
