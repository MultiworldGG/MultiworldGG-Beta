[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.dark_souls_2"
version = "0.0.0"
description = "MultiWorld: Dark Souls II"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "WildBunnie"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.dark_souls_2",]
namespaces = true
