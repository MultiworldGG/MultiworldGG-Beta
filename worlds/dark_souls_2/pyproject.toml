[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.dark_souls_2"
dynamic = ["version"]
description = "MultiWorld: Dark Souls II"
authors = [
    {name = "WildBunnie"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.dark_souls_2"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.dark_souls_2.Constants.VERSION"}
