[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.dkc3"
dynamic = ["version"]
description = "MultiWorld: Donkey Kong Country 3"
authors = [
    {name = "PoryGone"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.dkc3"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.dkc3.Constants.VERSION"}
