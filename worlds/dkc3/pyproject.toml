[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.dkc3"
version = "1.1.1"
description = "MultiWorld: Donkey Kong Country 3"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "PoryGone"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.dkc3",]
namespaces = true
