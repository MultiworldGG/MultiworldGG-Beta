[project]
name = "worlds.srb2"
version = "1.6.0"
description = "MultiWorld: Sonic Robo Blast 2"
classifiers = ["Private :: Do Not Upload"]
requires-python = ">=3.12"
[[project.authors]]
name = "GraymonDgt"

[project.entry-points."mwgg.client"]
"worlds.srb2.Client" = "worlds.srb2:launch_client"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.srb2"]
namespaces = true
