[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.kh1"
version = "0.0.1"
description = "MultiWorld: Kingdom Hearts"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "gaithern"

[project.entry-points."mwgg.client"]
"worlds.kh1.Client" = "worlds.kh1.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.kh1",]
namespaces = true
