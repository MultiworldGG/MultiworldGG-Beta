[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.kh1"
dynamic = ["version"]
description = "MultiWorld: Kingdom Hearts"
authors = [
    {name = "gaithern"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[project.entry-points."mwgg.client"]
"worlds.kh1.Client" = "worlds.kh1.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.kh1"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.kh1.Constants.VERSION"}
