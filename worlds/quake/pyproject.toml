[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.quake"
version = "0.2.1"
description = "MultiWorld: Quake 1"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "rand(0)"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.quake",]
namespaces = true
