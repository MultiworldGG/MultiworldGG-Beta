[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.quake"
dynamic = ["version"]
description = "MultiWorld: Quake 1"
authors = [
    {name = "rand(0)"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.quake"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.quake.Register.VERSION"}
