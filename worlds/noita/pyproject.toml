[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.noita"
version = "1.4.0"
description = "MultiWorld: Noita"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Heinermann"

[[project.authors]]
name = "ScipioWright"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.noita",]
namespaces = true
