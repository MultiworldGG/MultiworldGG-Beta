[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.noita"
dynamic = ["version"]
description = "MultiWorld: Noita"
authors = [
    {name = "ScipioWright"},
    {name = "heinermann"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.noita"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.noita.Constants.VERSION"}
