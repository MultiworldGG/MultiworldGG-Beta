[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.marioland2"
version = "1.0.1"
description = "MultiWorld: Super Mario Land 2"
license = "MIT"
license-files = [ "LICENSE",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Alchav"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.marioland2",]
namespaces = true
