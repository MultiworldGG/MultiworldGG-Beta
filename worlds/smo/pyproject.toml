[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.smo"
version = "1.0.1"
description = "MultiWorld: Super Mario Odyssey"
license = "MIT AND (Apache-2.0 AND (GPL-3.0-or-later))"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Kgamer77"

[project.entry-points."mwgg.client"]
"worlds.smo.Client" = "worlds.smo.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.smo",]
namespaces = true
