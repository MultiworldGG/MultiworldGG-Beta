[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.osrs"
version = "1.0.1"
description = "MultiWorld: Old School Runescape"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "digiholic"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.osrs",]
namespaces = true
