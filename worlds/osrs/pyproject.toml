[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.osrs"
dynamic = ["version"]
description = "MultiWorld: Old School Runescape"
authors = [
    {name = "digiholic"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.osrs"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.osrs.Constants.VERSION"}
