[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.paint"
version = "0.5.1"
description = "MultiWorld: Paint"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "MairoManTAW"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.paint",]
namespaces = true
