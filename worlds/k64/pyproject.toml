[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.k64"
dynamic = ["version"]
description = "MultiWorld: Kirby 64 - The Crystal Shards"
authors = [
    {name = "Silvris"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.k64"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.k64.Constants.VERSION"}
