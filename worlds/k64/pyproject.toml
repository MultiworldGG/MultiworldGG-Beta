[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.k64"
version = "0.0.0"
description = "MultiWorld: Kirby 64 - The Crystal Shards"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Silvris"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.k64",]
namespaces = true
