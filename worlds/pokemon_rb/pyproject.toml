[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.pokemon_rb"
version = "1.0.1"
description = "MultiWorld: Pokemon Red and Blue"
license = "MIT"
license-files = [ "LICENSE",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Alchav"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.pokemon_rb",]
namespaces = true
