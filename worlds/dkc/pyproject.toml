[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.dkc"
version = "0.0.1"
description = "MultiWorld: Donkey Kong Country"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "lx5"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.dkc",]
namespaces = true
