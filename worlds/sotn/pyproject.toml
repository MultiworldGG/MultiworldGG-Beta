[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sotn"
version = "0.0.0"
description = "MultiWorld: Symphony of the Night"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Lockmau"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.sotn",]
namespaces = true
