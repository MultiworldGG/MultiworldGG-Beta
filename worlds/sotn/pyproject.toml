[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sotn"
dynamic = ["version"]
description = "MultiWorld: Symphony of the Night"
authors = [
    {name = "Lockmau"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.sotn"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.sotn.Register.VERSION"}
