[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.doom_ii"
version = "1.0.1"
description = "MultiWorld: DOOM II"
license = "Zlib"
license-files = [ "LICENSE",]
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Daivuk"

[[project.authors]]
name = "Kaito Sinclaire"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.doom_ii",]
namespaces = true
