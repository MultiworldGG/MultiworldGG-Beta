[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.musedash"
dynamic = ["version"]
description = "MultiWorld: Muse Dash"
authors = [
    {name = "DeamonHunter"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.musedash"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.musedash.Constants.VERSION"}
