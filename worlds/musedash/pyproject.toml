[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.musedash"
version = "1.0.1"
description = "MultiWorld: Muse Dash"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "DeamonHunter"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.musedash",]
namespaces = true
