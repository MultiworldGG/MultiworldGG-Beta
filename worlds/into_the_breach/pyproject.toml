[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.into_the_breach"
version = "0.15.18"
description = "MultiWorld: Archipelago"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Unknown"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.into_the_breach",]
namespaces = true
