[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.overcooked2"
dynamic = ["version"]
description = "MultiWorld: Overcooked! 2"
authors = [
    {name = "toasterparty"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.overcooked2"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.overcooked2.Constants.VERSION"}
