[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.overcooked2"
version = "1.0.1"
description = "MultiWorld: Overcooked! 2"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "toasterparty"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.overcooked2",]
namespaces = true
