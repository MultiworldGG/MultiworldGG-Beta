[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.gzdoom"
version = "1.0.1"
description = "MultiWorld: gzDoom"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "ToxicFrog"

[project.entry-points."mwgg.client"]
"worlds.gzdoom.Client" = "worlds.gzdoom.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.gzdoom",]
namespaces = true
