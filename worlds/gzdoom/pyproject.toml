[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.gzdoom"
dynamic = ["version"]
description = "MultiWorld: gzDoom"
authors = [
    {name = "ToxicFrog"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.gzdoom"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.gzdoom.Constants.VERSION"}
