[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.huniepop2"
dynamic = ["version"]
description = "MultiWorld: Hunie Pop 2"
authors = [
    {name = "dotsofdarkness"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.huniepop2"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.huniepop2.Register.VERSION"}
