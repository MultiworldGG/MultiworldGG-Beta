[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.placidplasticducksim"
version = "0.0.0"
description = "MultiWorld: Placid Plastic Duck Simulator"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "SW_CreeperKing"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.placidplasticducksim",]
namespaces = true
