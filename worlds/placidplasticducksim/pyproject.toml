[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.placidplasticducksim"
dynamic = ["version"]
description = "MultiWorld: Placid Plastic Duck Simulator"
authors = [
    {name = "SW_CreeperKing"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.placidplasticducksim"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.placidplasticducksim.Constants.VERSION"}
