[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.messenger"
version = "1.0.1"
description = "MultiWorld: The Messenger"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "alwaysintreble"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.messenger",]
namespaces = true
