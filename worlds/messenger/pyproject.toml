[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.messenger"
dynamic = ["version"]
description = "MultiWorld: The Messenger"
authors = [
    {name = "alwaysintreble"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.messenger"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.messenger.Register.VERSION"}
