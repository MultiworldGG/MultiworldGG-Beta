[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.ff1"
dynamic = ["version"]
description = "MultiWorld: Final Fantasy"
authors = [
    {name = "jtoyoda (currently unmaintained)"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.ff1"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.ff1.Constants.VERSION"}
