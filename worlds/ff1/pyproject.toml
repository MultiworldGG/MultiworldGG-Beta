[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.ff1"
version = "0.0.0"
description = "MultiWorld: Final Fantasy"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "jtoyoda (currently unmaintained)"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.ff1",]
namespaces = true
