[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.pseudoregalia"
version = "0.7.1"
description = "MultiWorld: Pseudoregalia"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "LittleMeowMeow"

[[project.authors]]
name = "qwint"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.pseudoregalia",]
namespaces = true
