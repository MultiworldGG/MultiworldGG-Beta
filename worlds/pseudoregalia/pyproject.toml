[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.pseudoregalia"
dynamic = ["version"]
description = "MultiWorld: Pseudoregalia"
authors = [
    {name = "LittleMeowMeow"},
    {name = "qwint"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.pseudoregalia"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.pseudoregalia.Constants.VERSION"}
