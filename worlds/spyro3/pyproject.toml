[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.spyro3"
dynamic = ["version"]
description = "MultiWorld: Spyro 3"
authors = [
    {name = "ArsonAssassin"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.spyro3"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.spyro3.Register.VERSION"}
