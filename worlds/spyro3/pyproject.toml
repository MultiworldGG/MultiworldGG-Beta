[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.spyro3"
version = "0.0.0"
description = "MultiWorld: Spyro 3"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "ArsonAssassin"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.spyro3",]
namespaces = true
