[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.wl"
dynamic = ["version"]
description = "MultiWorld: Wario Land"
authors = [
    {name = "rand0"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.wl"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.wl.Register.VERSION"}
