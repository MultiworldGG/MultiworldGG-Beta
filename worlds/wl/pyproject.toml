[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.wl"
version = "0.0.1"
description = "MultiWorld: Wario Land"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "rand0"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.wl",]
namespaces = true
