[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.huniepop"
dynamic = ["version"]
description = "MultiWorld: Hunie Pop"
authors = [
    {name = "dotsofdarkness"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.huniepop"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.huniepop.Constants.VERSION"}
