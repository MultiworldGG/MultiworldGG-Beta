[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.wargroove"
dynamic = ["version"]
description = "MultiWorld: Wargroove"
authors = [
    {name = "FlySniper"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[project.entry-points."mwgg.client"]
"worlds.wargroove.Client" = "worlds.wargroove.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.wargroove"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.wargroove.Constants.VERSION"}
