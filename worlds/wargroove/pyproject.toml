[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.wargroove"
version = "0.0.1"
description = "MultiWorld: Wargroove"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "FlySniper"

[project.entry-points."mwgg.client"]
"worlds.wargroove.Client" = "worlds.wargroove.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.wargroove",]
namespaces = true
