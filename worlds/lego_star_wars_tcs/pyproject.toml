[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.lego_star_wars_tcs"
version = "1.1.5"
description = "MultiWorld: Lego Star Wars"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
dependencies = [ "Pymem>=1.10.0",]
[[project.authors]]
name = "Mysteryem"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.lego_star_wars_tcs",]
namespaces = true
