[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.poe"
version = "1.1.5"
description = "MultiWorld: Path of Exile"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "StuBob"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.poe",]
namespaces = true
