[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.yachtdice"
version = "2.1.4"
description = "MultiWorld: Yacht Dice"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Spineraks"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.yachtdice",]
namespaces = true
