[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.yachtdice"
dynamic = ["version"]
description = "MultiWorld: Yacht Dice"
authors = [
    {name = "Spineraks"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.yachtdice"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.yachtdice.Constants.VERSION"}
