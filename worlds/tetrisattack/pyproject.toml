[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.tetrisattack"
version = "0.0.0"
description = "MultiWorld: Tetris Attack"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "AgStarRay"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.tetrisattack",]
namespaces = true
