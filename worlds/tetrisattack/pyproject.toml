[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.tetrisattack"
dynamic = ["version"]
description = "MultiWorld: Tetris Attack"
authors = [
    {name = "AgStarRay"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.tetrisattack"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.tetrisattack.Constants.VERSION"}
