[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.momodoramoonlitfarewell"
version = "0.0.0"
description = "MultiWorld: Momodora Moonlit Farewell"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "alditto"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.momodoramoonlitfarewell",]
namespaces = true
