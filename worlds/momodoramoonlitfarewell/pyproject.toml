[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.momodoramoonlitfarewell"
dynamic = ["version"]
description = "MultiWorld: Momodora Moonlit Farewell"
authors = [
    {name = "alditto"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.momodoramoonlitfarewell"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.momodoramoonlitfarewell.Constants.VERSION"}
