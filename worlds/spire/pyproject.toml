[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.spire"
version = "2.0.1"
description = "MultiWorld: Slay the Spire"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "KonoTyran"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.spire",]
namespaces = true
