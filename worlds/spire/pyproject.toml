[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.spire"
dynamic = ["version"]
description = "MultiWorld: Slay the Spire"
authors = [
    {name = "KonoTyran"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.spire"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.spire.Constants.VERSION"}
