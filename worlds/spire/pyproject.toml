[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.spire"
version = "0.0.0"
description = "MultiWorld: Archipelago"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Unknown"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.spire",]
namespaces = true
