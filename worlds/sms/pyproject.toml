[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sms"
dynamic = ["version"]
description = "MultiWorld: Super Mario Sunshine"
authors = [
    {name = "Joshark"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"
dependencies = [
    "dolphin_memory_engine >= 1.1.3",
]

[project.entry-points."mwgg.client"]
"worlds.sms.Client" = "worlds.sms.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.sms"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.sms.Register.VERSION"}
