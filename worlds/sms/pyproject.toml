[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sms"
version = "0.2.1"
description = "MultiWorld: Super Mario Sunshine"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
dependencies = [ "dolphin_memory_engine >= 1.1.3",]
[[project.authors]]
name = "Joshark"

[project.entry-points."mwgg.client"]
"worlds.sms.Client" = "worlds.sms.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.sms",]
namespaces = true
