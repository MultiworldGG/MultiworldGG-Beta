[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.dontstarvetogether"
version = "1.3.2"
description = "MultiWorld: Archipelago"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Dragon Wolf Leo"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.dontstarvetogether",]
namespaces = true
