[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.dontstarvetogether"
version = "1.3.1.2"
description = "MultiWorld: Dont Starve Together"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Dragon Wolf Leo"

[project.entry-points."mwgg.client"]
"worlds.dontstarvetogether.Client" = "worlds.dontstarvetogether.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.dontstarvetogether",]
namespaces = true
