[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.dontstarvetogether"
dynamic = ["version"]
description = "MultiWorld: Dont Starve Together"
authors = [
    {name = "Dragon Wolf Leo"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[project.entry-points."mwgg.client"]
dontstarvetogether.Client = "dontstarvetogether.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = ["src/"]
include = ["worlds.dontstarvetogether"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.dontstarvetogether.Constants.VERSION"}
