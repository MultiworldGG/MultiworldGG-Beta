[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sonic_heroes"
dynamic = ["version"]
description = "MultiWorld: Sonic Heroes"
authors = [
    {name = "xMcacutt"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.sonic_heroes"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.sonic_heroes.Register.VERSION"}
