[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.sonic_heroes"
version = "1.0.1"
description = "MultiWorld: Sonic Heroes"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "xMcacutt"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.sonic_heroes",]
namespaces = true
