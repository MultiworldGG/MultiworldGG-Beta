[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.candybox2"
version = "1.20251023.2"
description = "MultiWorld: Candy Box 2"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "Victor Tran"

[[project.authors]]
name = "Aren Merzoian"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.candybox2",]
namespaces = true
