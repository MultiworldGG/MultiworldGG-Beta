[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.candybox2"
dynamic = ["version"]
description = "MultiWorld: Candy Box 2"
authors = [
    {name = "Victor Tran"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.candybox2"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.candybox2.Constants.VERSION"}
