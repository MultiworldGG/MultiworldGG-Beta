[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.dw1"
version = "0.0.0"
description = "MultiWorld: Digimon World"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
[[project.authors]]
name = "ArsonAssassin"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.dw1",]
namespaces = true
