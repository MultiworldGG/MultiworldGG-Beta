[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.ss"
dynamic = ["version"]
description = "MultiWorld: Skyward Sword"
authors = [
    {name = "Battlecats59"}
]
classifiers = [
    "Private :: Do Not Upload"
]
requires-python = ">=3.12"
dependencies = [
    "dolphin-memory-engine>=1.3.0",
]

[project.entry-points."mwgg.client"]
"worlds.ss.Client" = "worlds.ss.Register:CLIENT_FUNCTION"


[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.ss"]
namespaces = true

[tool.setuptools.dynamic]
version = {attr = "worlds.ss.Register.VERSION"}
