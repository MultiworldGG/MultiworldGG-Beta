[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.ss"
version = "0.5.4"
description = "MultiWorld: Skyward Sword"
classifiers = [ "Private :: Do Not Upload",]
requires-python = ">=3.12"
dependencies = [ "dolphin-memory-engine>=1.3.0",]
[[project.authors]]
name = "Battlecats59"

[project.entry-points."mwgg.client"]
"worlds.ss.Client" = "worlds.ss.Register:CLIENT_FUNCTION"

[tool.setuptools.packages.find]
where = [ "src",]
include = [ "worlds.ss",]
namespaces = true
