name: Release - Build Distributables

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.1.0)'
        required: true
        type: string
      create_release:
        description: 'Create GitHub release'
        required: false
        type: boolean
        default: true
  
  push:
    tags:
      - '[0-9]*'

env:
  PYTHON_VERSION: '3.12'

jobs:
  build-exe:
    name: Build Executable - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: windows-exe
            exe_pattern: '*.exe'
          - os: ubuntu-latest
            artifact_name: linux-exe
            exe_pattern: 'MultiworldGG'
          - os: macos-latest
            artifact_name: macos-exe
            exe_pattern: 'MultiworldGG'
    
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
      
      - name: Download SNI executables
        shell: bash
        run: |
          cd src
          mkdir -p data/SNI
          
          # Get latest release tag from GitHub API with retry logic
          echo "Fetching latest SNI release..."
          LATEST_RELEASE=""
          
          # Try up to 3 times to fetch the release tag
          for attempt in 1 2 3; do
            echo "Attempt $attempt to fetch release tag..."
            LATEST_RELEASE=$(curl -s --connect-timeout 10 --max-time 30 https://api.github.com/repos/alttpo/sni/releases/latest | grep '"tag_name"' | sed -E 's/.*"tag_name": "([^"]+)".*/\1/')
            
            if [ -n "$LATEST_RELEASE" ]; then
              echo "Successfully fetched release tag: ${LATEST_RELEASE}"
              break
            else
              echo "Attempt $attempt failed"
              if [ $attempt -lt 3 ]; then
                echo "Retrying in 5 seconds..."
                sleep 5
              fi
            fi
          done
          
          # If still no release tag, use a fallback
          if [ -z "$LATEST_RELEASE" ]; then
            echo "Warning: Failed to fetch latest release tag from GitHub API"
            echo "Using fallback version v0.0.101"
            LATEST_RELEASE="v0.0.101"
          fi
          
          echo "Using SNI release: ${LATEST_RELEASE}"
          
          # Determine platform-specific asset name and extraction method
          if [ "$RUNNER_OS" == "Windows" ]; then
            ASSET_NAME="sni-${LATEST_RELEASE}-windows-amd64.zip"
          elif [ "$RUNNER_OS" == "Linux" ]; then
            ASSET_NAME="sni-${LATEST_RELEASE}-linux-amd64.tar.xz"
          elif [ "$RUNNER_OS" == "macOS" ]; then
            ASSET_NAME="sni-${LATEST_RELEASE}-darwin-universal.tar.gz"
          else
            echo "Unknown OS: $RUNNER_OS"
            exit 1
          fi
          
          # Download from latest release with retry logic
          DOWNLOAD_URL="https://github.com/alttpo/sni/releases/download/${LATEST_RELEASE}/${ASSET_NAME}"
          echo "Downloading SNI from ${DOWNLOAD_URL}"
          
          DOWNLOAD_SUCCESS=false
          for attempt in 1 2 3; do
            echo "Download attempt $attempt..."
            
            if [ "$RUNNER_OS" == "Windows" ]; then
              if curl -L --connect-timeout 10 --max-time 60 -o sni.zip "${DOWNLOAD_URL}"; then
                if unzip -q sni.zip -d data/SNI && rm sni.zip; then
                  DOWNLOAD_SUCCESS=true
                  break
                else
                  echo "Failed to extract ZIP file on attempt $attempt"
                fi
              else
                echo "Failed to download ZIP file on attempt $attempt"
              fi
            elif [ "$RUNNER_OS" == "Linux" ]; then
              # Extract .tar.xz (use J flag)
              if curl -L --connect-timeout 10 --max-time 60 "${DOWNLOAD_URL}" | tar xJ -C data/SNI; then
                DOWNLOAD_SUCCESS=true
                break
              else
                echo "Failed to download/extract .tar.xz on attempt $attempt"
              fi
            elif [ "$RUNNER_OS" == "macOS" ]; then
              # Extract .tar.gz (use z flag)
              if curl -L --connect-timeout 10 --max-time 60 "${DOWNLOAD_URL}" | tar xz -C data/SNI; then
                DOWNLOAD_SUCCESS=true
                break
              else
                echo "Failed to download/extract .tar.gz on attempt $attempt"
              fi
            fi
            
            if [ $attempt -lt 3 ]; then
              echo "Retrying download in 5 seconds..."
              sleep 5
            fi
          done
          
          if [ "$DOWNLOAD_SUCCESS" = false ]; then
            echo "Error: Failed to download SNI after 3 attempts"
            echo "Continuing without SNI - build may fail if SNI is required"
            exit 1
          fi
          
          # Make executables executable on Unix
          if [ "$RUNNER_OS" != "Windows" ]; then
            chmod +x data/SNI/*
          fi
          
          echo "SNI ${LATEST_RELEASE} downloaded successfully"
          ls -la data/SNI/
      
      - name: Download Python installers (Windows only)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd src
          mkdir -p python_installers
          
          PYTHON_VERSION="3.12.12"
          echo "Downloading Python ${PYTHON_VERSION} installers for Windows..."
          
          # Download x64 installer
          curl -L -o "python_installers/python-${PYTHON_VERSION}-amd64.exe" \
            "https://www.python.org/ftp/python/${PYTHON_VERSION}/python-${PYTHON_VERSION}-amd64.exe"
          echo "Downloaded x64 installer"
          
          # Download ARM64 installer
          curl -L -o "python_installers/python-${PYTHON_VERSION}-arm64.exe" \
            "https://www.python.org/ftp/python/${PYTHON_VERSION}/python-${PYTHON_VERSION}-arm64.exe"
          echo "Downloaded ARM64 installer"
          
          ls -la python_installers/
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Create fresh virtual environment
        shell: bash
        run: |
          python -m venv venv
          
          # Activate based on OS
          if [ "$RUNNER_OS" == "Windows" ]; then
            source venv/Scripts/activate
            python -m pip install --upgrade pip
          else
            source venv/bin/activate
            python -m pip install --upgrade pip
          fi
      
      - name: Install build dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          source venv/Scripts/activate
          cd src
          pip install -r requirements.txt
          pip install -r build_requirements.txt
      
      - name: Install build dependencies (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          source venv/bin/activate
          cd src
          pip install -r requirements.txt
          pip install -r build_requirements.txt
      
      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          source venv/Scripts/activate
          cd src
          python build_exe.py
      
      - name: Build executable (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          source venv/bin/activate
          cd src
          python build_exe.py
      
      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src/build/**/*
          retention-days: 90

  build-linux-appimage:
    name: Build Linux AppImage
    needs: build-exe
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Download Linux exe artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-exe
          path: src/build/
      
      - name: Create virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          cd src
          pip install -r requirements.txt
          pip install -r build_requirements.txt
          
          # Install mwgg_igdb_sixteen (default age-filtered variant)
          # Users can optionally install nr (unfiltered) later
          for wheel in default_wheels/mwgg_igdb_sixteen-*.whl; do
            if [ -f "$wheel" ]; then
              echo "Installing $wheel..."
              pip install "$wheel" --force-reinstall || pip install "$wheel" --no-deps --force-reinstall || echo "Failed to install $wheel"
              break
            fi
          done
          
          # Install other default wheels (skip platform-specific and igdb variants)
          for wheel in default_wheels/*.whl; do
            if [ -f "$wheel" ]; then
              # Skip igdb variants (already handled)
              if [[ "$wheel" =~ (mwgg_igdb-|mwgg_igdb_sixteen-|mwgg_igdb_twelve-) ]]; then
                continue
              fi
              # Skip Windows-specific wheels on Linux
              if [[ "$wheel" =~ (win_amd64|win32) ]]; then
                continue
              fi
              echo "Installing $wheel..."
              pip install "$wheel" --force-reinstall || pip install "$wheel" --no-deps --force-reinstall || echo "Failed to install $wheel"
            fi
          done
          
          # Install worlds wheels
          for wheel in worlds_wheels/*.whl; do
            if [ -f "$wheel" ]; then
              echo "Installing $wheel..."
              pip install "$wheel" --force-reinstall || pip install "$wheel" --no-deps --force-reinstall || echo "Failed to install $wheel"
            fi
          done
      
      - name: Build AppImage
        run: |
          source venv/bin/activate
          cd src
          python setup.py bdist_appimage
      
      - name: Rename AppImage to include version suffix
        run: |
          cd src/dist
          # Find the AppImage file and rename it to include the full version from application.yaml
          for file in *.AppImage; do
            if [ -f "$file" ]; then
              # Extract base name without extension
              basename="${file%.AppImage}"
              # Check if it already has the version suffix
              if [[ ! "$basename" =~ a5$ ]]; then
                newname="${basename}a5.AppImage"
                echo "Renaming $file to $newname"
                mv "$file" "$newname"
              fi
            fi
          done
      
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: src/dist/*.AppImage
          retention-days: 90

  build-mac-bundle:
    name: Build macOS Bundle
    needs: build-exe
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Download macOS exe artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-exe
          path: src/build/
      
      - name: Create virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          cd src
          pip install -r requirements.txt
          pip install -r build_requirements.txt
          
          # Install mwgg_igdb_sixteen (default age-filtered variant)
          # Users can optionally install nr (unfiltered) later
          for wheel in default_wheels/mwgg_igdb_sixteen-*.whl; do
            if [ -f "$wheel" ]; then
              echo "Installing $wheel..."
              pip install "$wheel" --force-reinstall || pip install "$wheel" --no-deps --force-reinstall || echo "Failed to install $wheel"
              break
            fi
          done
          
          # Install other default wheels (skip platform-specific and igdb variants)
          for wheel in default_wheels/*.whl; do
            if [ -f "$wheel" ]; then
              # Skip igdb variants (already handled)
              if [[ "$wheel" =~ (mwgg_igdb-|mwgg_igdb_sixteen-|mwgg_igdb_twelve-) ]]; then
                continue
              fi
              # Skip Windows-specific wheels on macOS
              if [[ "$wheel" =~ (win_amd64|win32) ]]; then
                continue
              fi
              # Skip Linux-specific wheels on macOS
              if [[ "$wheel" =~ linux ]]; then
                continue
              fi
              echo "Installing $wheel..."
              pip install "$wheel" --force-reinstall || pip install "$wheel" --no-deps --force-reinstall || echo "Failed to install $wheel"
            fi
          done
          
          # Install worlds wheels
          for wheel in worlds_wheels/*.whl; do
            if [ -f "$wheel" ]; then
              echo "Installing $wheel..."
              pip install "$wheel" --force-reinstall || pip install "$wheel" --no-deps --force-reinstall || echo "Failed to install $wheel"
            fi
          done
      
      - name: Build macOS bundle
        run: |
          source venv/bin/activate
          cd src
          python setup.py bdist_mac
      
      - name: Build macOS DMG
        run: |
          source venv/bin/activate
          cd src
          python setup.py bdist_dmg
      
      - name: Rename DMG to include version suffix
        run: |
          cd src/build
          # Find the DMG file and rename it to include the full version from application.yaml
          for file in *.dmg; do
            if [ -f "$file" ]; then
              # Extract base name without extension
              basename="${file%.dmg}"
              # Check if it already has the version suffix
              if [[ ! "$basename" =~ a5$ ]]; then
                newname="${basename}a5.dmg"
                echo "Renaming $file to $newname"
                mv "$file" "$newname"
              fi
            fi
          done
      
      - name: Upload macOS bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundle
          path: |
            src/build/*.dmg
          retention-days: 90

  build-windows-installer:
    name: Build Windows Installer
    needs: build-exe
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
      
      - name: Download Windows exe artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: src/build/
      
      - name: Install Inno Setup
        run: |
          choco install innosetup -y
      
      - name: Debug - List build directory contents
        shell: pwsh
        run: |
          cd src
          Write-Host "Contents of build directory:"
          Get-ChildItem -Path build -Recurse | Select-Object FullName
      
      - name: Build Windows installer
        shell: pwsh
        run: |
          cd src
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" inno_setup.iss
      
      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src/setups/*.exe
          retention-days: 90

  create-release:
    name: Create GitHub Release
    needs: [build-exe, build-linux-appimage, build-mac-bundle, build-windows-installer]
    runs-on: ubuntu-latest
    if: |
      always() && 
      (github.event_name == 'push' || inputs.create_release) &&
      (needs.build-exe.result == 'success' || needs.build-exe.result == 'failure')
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
      
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
      
      - name: Display structure of downloaded files
        run: ls -R release-artifacts/
      
      - name: Create release notes
        run: |
          cat > release-notes.md << 'EOF'          
          ## Downloads
          
          ### Windows
          - **Installer**: `Setup MultiworldGG-Test *.exe` (recommended)
          - **Portable**: Extract from `windows-exe.zip`
          
          ### Linux
          - **AppImage**: `*.AppImage` (recommended)
          - **Portable**: Extract from `linux-exe.zip`
          
          ### macOS
          - **Bundle**: `*.app` or `*.dmg`
          - **Portable**: Extract from `macos-exe.zip`
          
          ## Installation
          
          ### Windows
          Run the installer or extract the portable version.
          
          ### Linux
          ```bash
          chmod +x MultiworldGG-*.AppImage
          ./MultiworldGG-*.AppImage
          ```
          
          ### macOS
          Mount the DMG and drag to Applications, or run the .app directly.
          
          ---
          
          **Note**: This is an alpha release. Expect bugs and breaking changes.
          
          **Manual action required**: If you've added new worlds, you may need to replace placeholder strings in template files.
          EOF
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: MultiworldGG-Test ${{ steps.version.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: true
          files: |
            release-artifacts/windows-installer/*.exe
            release-artifacts/linux-appimage/*.AppImage
            release-artifacts/macos-bundle/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

