name: Create and Build Worlds (Manual)

on:
  workflow_dispatch:
    inputs:
      worlds:
        description: 'Comma-separated list of world folders (e.g., "tloz,oot,sm64")'
        required: true
        type: string
      overwrite:
        description: 'Overwrite existing files if they exist'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.12'

jobs:
  create-world-files:
    name: Create World Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Create world files
        run: |
          cd src
          # Split comma-separated input and trim whitespace
          IFS=',' read -ra WORLD_ARRAY <<< "${{ inputs.worlds }}"
          
          for world in "${WORLD_ARRAY[@]}"; do
            # Trim whitespace
            world=$(echo "$world" | xargs)
            
            if [ -z "$world" ]; then
              continue
            fi
            
            echo "Creating world files for: $world"
            
            if [ "${{ inputs.overwrite }}" == "true" ]; then
              python tools/add_required_world_files.py "$world" --overwrite
            else
              python tools/add_required_world_files.py "$world"
            fi
          done
      
      - name: Configure git
        run: |
          cd src
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commit new world files
        run: |
          cd src
          BRANCH_NAME="${{ github.ref_name }}"
          git add worlds/*/pyproject.toml worlds/*/archipelago.json worlds/*/Register.py
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: add template files for worlds" -m "Manually triggered workflow for worlds: ${{ inputs.worlds }}" -m "MANUAL ACTION REQUIRED: Replace placeholder strings in the generated files."
            # Fetch latest changes and rebase before pushing
            git fetch origin "$BRANCH_NAME"
            git rebase "origin/$BRANCH_NAME" || {
              echo "Rebase failed, trying to pull with merge strategy"
              git pull --rebase origin "$BRANCH_NAME" || exit 1
            }
            git push origin "$BRANCH_NAME"
          fi

  build-changed-worlds:
    name: Build Changed Worlds
    runs-on: ubuntu-latest
    needs: create-world-files
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        if: inputs.worlds != ''
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install build toml
      
      - name: Build changed worlds
        if: inputs.worlds != ''
        run: |
          source venv/bin/activate
          cd src
          python tools/build_wheels.py --world "${{ inputs.worlds }}"
      
      - name: Configure git
        if: inputs.worlds != ''
        run: |
          cd src
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commit updated pyproject.toml files
        if: inputs.worlds != ''
        run: |
          cd src
          git add worlds/*/pyproject.toml
          if git diff --staged --quiet; then
            echo "No pyproject.toml changes to commit"
          else
            git commit -m "chore: update world pyproject.toml versions [skip ci]"
            # Fetch latest changes and rebase before pushing
            git fetch origin gui-changes
            git rebase origin/gui-changes || {
              echo "Rebase failed, trying to pull with merge strategy"
              git pull --rebase origin gui-changes || exit 1
            }
            git push origin gui-changes
          fi
      
      - name: Upload to private PyPI
        if: inputs.worlds != ''
        env:
          TWINE_USERNAME: delilah
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
          TWINE_REPOSITORY_URL: ${{ vars.PYPI_URL }}
        run: |
          source venv/bin/activate
          pip install twine
          for file in dist/worlds_*.whl dist/worlds_*.tar.gz; do
            if [ -f "$file" ]; then
              python -m twine upload "$file" --verbose || echo "Failed to upload $file, continuing..."
            fi
          done
      
      - name: Upload world wheels as artifacts
        if: inputs.worlds != ''
        uses: actions/upload-artifact@v4
        with:
          name: world-wheels
          path: |
            dist/worlds_*.whl
            dist/worlds_*.tar.gz
          retention-days: 30
