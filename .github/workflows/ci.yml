name: CI - Build and Test

on:
  push:
    branches: [gui-changes]
    paths:
      - '**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [gui-changes]

env:
  PYTHON_VERSION: '3.13'

jobs:
  build-splashscreen:
    name: Build Splashscreen
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/gui-changes'
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          path: src
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Check for splashscreen changes
        id: check_changes
        run: |
          cd src
          # Find the latest commit that touched splashscreen/ folder and check what changed
          LAST_COMMIT=$(git log -1 --format=%H -- splashscreen/ 2>/dev/null || echo "")
          CHANGED_SPLASHSCREEN_FILES=$(git diff-tree --no-commit-id --name-only -r "$LAST_COMMIT" 2>/dev/null | grep '^splashscreen/' | grep -v '^splashscreen/pyproject.toml$' || true)
          
          if [ -n "$CHANGED_SPLASHSCREEN_FILES" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Set up Python
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install build dependencies
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install build toml
      
      - name: Update splashscreen version
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          python tools/update_version.py --package splash
      
      - name: Build splashscreen wheel
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src/splashscreen
          python -m build
      
      - name: Copy wheel to default_wheels
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          mkdir -p default_wheels
          cp splashscreen/dist/*.whl default_wheels/
      
      - name: Configure git
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commit wheel and version updates
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          git add default_wheels/
          git add splashscreen/pyproject.toml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update splashscreen wheel and version"
            # Fetch latest changes and rebase before pushing
            git fetch origin gui-changes
            git rebase origin/gui-changes || {
              echo "Rebase failed, trying to pull with merge strategy"
              git pull --rebase origin gui-changes || exit 1
            }
            git push origin gui-changes
          fi

  build-gui:
    name: Build GUI
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/gui-changes'
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          path: src
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Check for GUI changes
        id: check_changes
        run: |
          cd src
          # Find the latest commit that touched gui/ folder and check what changed
          LAST_COMMIT=$(git log -1 --format=%H -- gui/ 2>/dev/null || echo "")
          CHANGED_GUI_FILES=$(git diff-tree --no-commit-id --name-only -r "$LAST_COMMIT" 2>/dev/null | grep '^gui/' | grep -v '^gui/pyproject.toml$' || true)
          
          if [ -n "$CHANGED_GUI_FILES" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Set up Python
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install build dependencies
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install build toml
      
      - name: Update GUI version
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          python tools/update_version.py --package gui
      
      - name: Build GUI wheel
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src/gui
          python -m build
      
      - name: Copy wheel to default_wheels
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          mkdir -p default_wheels
          cp gui/dist/*.whl default_wheels/
      
      - name: Configure git
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commit wheel and version updates
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          git add default_wheels/
          git add gui/pyproject.toml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update GUI wheel and version"
            # Fetch latest changes and rebase before pushing
            git fetch origin gui-changes
            git rebase origin/gui-changes || {
              echo "Rebase failed, trying to pull with merge strategy"
              git pull --rebase origin gui-changes || exit 1
            }
            git push origin gui-changes
          fi

  build-base-worlds:
    name: Build Base Worlds Package
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/gui-changes'
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          path: src
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Check for namespace files changes
        id: check_changes
        run: |
          cd src
          if git diff --name-only HEAD~1 HEAD | grep -q '^worlds/.*\.py$'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Set up Python
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install build dependencies
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install build
      
      - name: Extract WORLDS_VERSION from BaseUtils.py
        if: steps.check_changes.outputs.changed == 'true'
        id: get_worlds_version
        run: |
          cd src
          WORLDS_VERSION=$(python -c "import sys; sys.path.insert(0, '.'); from BaseUtils import __version__; print(__version__)")
          echo "WORLDS_VERSION=$WORLDS_VERSION" >> $GITHUB_OUTPUT
          echo "Extracted WORLDS_VERSION: $WORLDS_VERSION"
      
      - name: Create version.txt for build
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          mkdir -p world_build_setuptools/src
          echo "${{ steps.get_worlds_version.outputs.WORLDS_VERSION }}" > world_build_setuptools/src/_version.txt
      
      - name: Copy namespace files to build directory
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          mkdir -p world_build_setuptools/src/worlds
          cp worlds/*.py world_build_setuptools/src/worlds/
      
      - name: Build base worlds wheel
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src/world_build_setuptools
          python -m build
      
      - name: Copy wheel to worlds_wheels
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          mkdir -p worlds_wheels
          cp world_build_setuptools/dist/*.whl worlds_wheels/
      
      - name: Configure git
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commit wheel
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          git add worlds_wheels/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update base worlds wheel"
            # Fetch latest changes and rebase before pushing
            git fetch origin gui-changes
            git rebase origin/gui-changes || {
              echo "Rebase failed, trying to pull with merge strategy"
              git pull --rebase origin gui-changes || exit 1
            }
            git push origin gui-changes
          fi

  build-default-worlds:
    name: Build Default Worlds
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/gui-changes'
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          path: src
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Check for changes in default worlds
        id: check_changes
        run: |
          cd src
          CHANGED_WORLDS=""
          
          # Find all worlds that start with _ or are named generic
          for world_dir in worlds/*/; do
            if [ ! -d "$world_dir" ]; then
              continue
            fi
            
            world_name=$(basename "$world_dir")
            
            # Include worlds that start with _ or are named generic
            if [[ "$world_name" == "_"* ]] || [[ "$world_name" == "generic" ]]; then
              if git diff --name-only HEAD~1 HEAD | grep -q "^worlds/$world_name/"; then
                if [ -z "$CHANGED_WORLDS" ]; then
                  CHANGED_WORLDS="$world_name"
                else
                  CHANGED_WORLDS="$CHANGED_WORLDS $world_name"
                fi
                echo "Detected changes in default world: $world_name"
              fi
            fi
          done
          
          echo "changed_worlds=$CHANGED_WORLDS" >> $GITHUB_OUTPUT
          if [ -n "$CHANGED_WORLDS" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Set up Python
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install build dependencies
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install build toml
      
      - name: Build changed default worlds
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          source venv/bin/activate
          cd src
          # Convert space-separated list to comma-separated for build_wheels.py
          WORLDS_CSV=$(echo "${{ steps.check_changes.outputs.changed_worlds }}" | tr ' ' ',')
          python tools/build_wheels.py --world "$WORLDS_CSV"
      
      - name: Copy wheels to worlds_wheels
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          mkdir -p src/worlds_wheels
          cp dist/worlds_*.whl src/worlds_wheels/ 2>/dev/null || true
          cp dist/worlds_*.tar.gz src/worlds_wheels/ 2>/dev/null || true
      
      - name: Configure git
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          cd src
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commit wheels
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          cd src
          git add worlds_wheels/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update default world wheels"
            # Fetch latest changes and rebase before pushing
            git fetch origin gui-changes
            git rebase origin/gui-changes || {
              echo "Rebase failed, trying to pull with merge strategy"
              git pull --rebase origin gui-changes || exit 1
            }
            # Fetch again right before push to minimize race condition window
            git fetch origin gui-changes
            git rebase origin/gui-changes || {
              echo "Rebase failed after second fetch, aborting"
              git rebase --abort || true
              exit 1
            }
            # Use --force-with-lease to safely handle concurrent pushes
            git push --force-with-lease origin gui-changes
          fi
