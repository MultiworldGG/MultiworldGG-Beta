name: CI - Build and Test

on:
  push:
    branches: [gui-changes]
    paths:
      - '**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [gui-changes]

env:
  PYTHON_VERSION: '3.12'

jobs:
  build-splashscreen:
    name: Build Splashscreen
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/gui-changes'
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Check for splashscreen changes
        id: check_changes
        run: |
          cd src
          # Find the latest commit that touched splashscreen/ folder and check what changed
          LAST_COMMIT=$(git log -1 --format=%H -- splashscreen/ 2>/dev/null || echo "")
          CHANGED_SPLASHSCREEN_FILES=$(git diff-tree --no-commit-id --name-only -r "$LAST_COMMIT" 2>/dev/null | grep '^splashscreen/' | grep -v '^splashscreen/pyproject.toml$' || true)
          
          if [ -n "$CHANGED_SPLASHSCREEN_FILES" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Set up Python
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install build dependencies
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install build toml
      
      - name: Update splashscreen version
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          python tools/update_version.py --package splash
      
      - name: Build splashscreen wheel
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src/splashscreen
          python -m build
      
      - name: Copy wheel to default_wheels
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          mkdir -p default_wheels
          cp splashscreen/dist/*.whl default_wheels/
      
      - name: Configure git
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commit wheel and version updates
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          git add default_wheels/
          git add splashscreen/pyproject.toml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update splashscreen wheel and version"
            # Fetch latest changes and rebase before pushing
            git fetch origin gui-changes
            git rebase origin/gui-changes || {
              echo "Rebase failed, trying to pull with merge strategy"
              git pull --rebase origin gui-changes || exit 1
            }
            git push origin gui-changes
          fi

  build-gui:
    name: Build GUI
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/gui-changes'
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Check for GUI changes
        id: check_changes
        run: |
          cd src
          # Find the latest commit that touched gui/ folder and check what changed
          LAST_COMMIT=$(git log -1 --format=%H -- gui/ 2>/dev/null || echo "")
          CHANGED_GUI_FILES=$(git diff-tree --no-commit-id --name-only -r "$LAST_COMMIT" 2>/dev/null | grep '^gui/' | grep -v '^gui/pyproject.toml$' || true)
          
          if [ -n "$CHANGED_GUI_FILES" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Set up Python
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install build dependencies
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install build toml
      
      - name: Update GUI version
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          python tools/update_version.py --package gui
      
      - name: Build GUI wheel
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src/gui
          python -m build
      
      - name: Copy wheel to default_wheels
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          mkdir -p default_wheels
          cp gui/dist/*.whl default_wheels/
      
      - name: Configure git
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commit wheel and version updates
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          git add default_wheels/
          git add gui/pyproject.toml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update GUI wheel and version"
            # Fetch latest changes and rebase before pushing
            git fetch origin gui-changes
            git rebase origin/gui-changes || {
              echo "Rebase failed, trying to pull with merge strategy"
              git pull --rebase origin gui-changes || exit 1
            }
            git push origin gui-changes
          fi

  build-base-worlds:
    name: Build Base Worlds Package
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/gui-changes'
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Check for namespace files changes
        id: check_changes
        run: |
          cd src
          if git diff --name-only HEAD~1 HEAD | grep -q '^worlds/.*\.py$'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Set up Python
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install build dependencies
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install build
      
      - name: Extract WORLDS_VERSION from BaseUtils.py
        if: steps.check_changes.outputs.changed == 'true'
        id: get_worlds_version
        run: |
          cd src
          WORLDS_VERSION=$(python -c "import sys; sys.path.insert(0, '.'); from BaseUtils import __version__; print(__version__)")
          echo "WORLDS_VERSION=$WORLDS_VERSION" >> $GITHUB_OUTPUT
          echo "Extracted WORLDS_VERSION: $WORLDS_VERSION"
      
      - name: Create version.txt for build
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          mkdir -p world_build_setuptools/src
          echo "${{ steps.get_worlds_version.outputs.WORLDS_VERSION }}" > world_build_setuptools/src/_version.txt
      
      - name: Copy namespace files to build directory
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          mkdir -p world_build_setuptools/src/worlds
          cp worlds/*.py world_build_setuptools/src/worlds/
      
      - name: Build base worlds wheel
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src/world_build_setuptools
          python -m build
      
      - name: Copy wheel to worlds_wheels
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          mkdir -p worlds_wheels
          cp world_build_setuptools/dist/*.whl worlds_wheels/
      
      - name: Configure git
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commit wheel
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd src
          git add worlds_wheels/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update base worlds wheel"
            # Fetch latest changes and rebase before pushing
            git fetch origin gui-changes
            git rebase origin/gui-changes || {
              echo "Rebase failed, trying to pull with merge strategy"
              git pull --rebase origin gui-changes || exit 1
            }
            git push origin gui-changes
          fi

  build-default-worlds:
    name: Build Default Worlds
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/gui-changes'
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Check for changes in default worlds
        id: check_changes
        run: |
          cd src
          CHANGED_WORLDS=""
          
          # Find all worlds that start with _ or are named generic
          for world_dir in worlds/*/; do
            if [ ! -d "$world_dir" ]; then
              continue
            fi
            
            world_name=$(basename "$world_dir")
            
            # Include worlds that start with _ or are named generic
            if [[ "$world_name" == "_"* ]] || [[ "$world_name" == "generic" ]]; then
              if git diff --name-only HEAD~1 HEAD | grep -q "^worlds/$world_name/"; then
                if [ -z "$CHANGED_WORLDS" ]; then
                  CHANGED_WORLDS="$world_name"
                else
                  CHANGED_WORLDS="$CHANGED_WORLDS $world_name"
                fi
                echo "Detected changes in default world: $world_name"
              fi
            fi
          done
          
          echo "changed_worlds=$CHANGED_WORLDS" >> $GITHUB_OUTPUT
          if [ -n "$CHANGED_WORLDS" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Set up Python
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install build dependencies
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install build toml
      
      - name: Build changed default worlds
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          source venv/bin/activate
          cd src
          # Convert space-separated list to comma-separated for build_wheels.py
          WORLDS_CSV=$(echo "${{ steps.check_changes.outputs.changed_worlds }}" | tr ' ' ',')
          python tools/build_wheels.py --world "$WORLDS_CSV"
      
      - name: Copy wheels to worlds_wheels
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          mkdir -p src/worlds_wheels
          cp dist/worlds_*.whl src/worlds_wheels/ 2>/dev/null || true
          cp dist/worlds_*.tar.gz src/worlds_wheels/ 2>/dev/null || true
      
      - name: Configure git
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          cd src
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commit wheels
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          cd src
          git add worlds_wheels/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update default world wheels"
            # Fetch latest changes and rebase before pushing
            git fetch origin gui-changes
            git rebase origin/gui-changes || {
              echo "Rebase failed, trying to pull with merge strategy"
              git pull --rebase origin gui-changes || exit 1
            }
            git push origin gui-changes
          fi

  check-new-worlds:
    name: Check for New Worlds
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/gui-changes'
    outputs:
      new_worlds: ${{ steps.detect.outputs.new_worlds }}
      has_new_worlds: ${{ steps.detect.outputs.has_new_worlds }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Detect new world directories
        id: detect
        env:
          PYPI_URL: ${{ vars.PYPI_URL }}
        run: |
          cd src
          # Get packages from PyPI using pip list
          INDEX_URL="$PYPI_URL/+simple"
          
          echo "Fetching packages from PyPI index: $INDEX_URL"
          
          # Get packages in JSON format and extract package names
          PYPI_PACKAGES=$(curl "$INDEX_URL" -L -H "Accept: application/vnd.pypi.simple.v1+json" 2>/dev/null | jq '.projects[].name')
          
          if [ -z "$PYPI_PACKAGES" ]; then
            echo "Warning: Failed to fetch packages from PyPI, skipping new world detection"
            echo "new_worlds=" >> $GITHUB_OUTPUT
            echo "has_new_worlds=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          PACKAGE_COUNT=$(echo "$PYPI_PACKAGES" | wc -l)
          echo "Found $PACKAGE_COUNT packages in PyPI"
          
          # Get all world directories
          NEW_WORLDS=""
          HAS_NEW=false
          
          for world_dir in worlds/*/; do
            if [ ! -d "$world_dir" ]; then
              continue
            fi
            
            world_name=$(basename "$world_dir")
            
            # Skip special directories
            if [[ "$world_name" == "_"* ]] || [[ "$world_name" == "generic" ]]; then
              continue
            fi
            
            # Package name format is worlds-{world_name with underscores replaced with hyphens}
            package_name="worlds-${world_name//_/-}"
            
            # Check if package exists in PyPI
            if ! echo "$PYPI_PACKAGES" | grep -q "$package_name"; then
              NEW_WORLDS="$NEW_WORLDS $world_name"
              HAS_NEW=true
              echo "Found new world not in PyPI: $world_name (package: $package_name)"
            else
              echo "World already in PyPI: $world_name"
            fi
          done
          
          echo "new_worlds=$NEW_WORLDS" >> $GITHUB_OUTPUT
          echo "has_new_worlds=$HAS_NEW" >> $GITHUB_OUTPUT
          echo "New worlds detected: $NEW_WORLDS"
      
      - name: Create world files for new worlds
        if: steps.detect.outputs.has_new_worlds == 'true'
        run: |
          cd src
          for world in ${{ steps.detect.outputs.new_worlds }}; do
            echo "Creating world files for: $world"
            python tools/add_required_world_files.py "$world"
          done
      
      - name: Configure git
        if: steps.detect.outputs.has_new_worlds == 'true'
        run: |
          cd src
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commit new world files
        if: steps.detect.outputs.has_new_worlds == 'true'
        run: |
          cd src
          git add worlds/*/pyproject.toml worlds/*/archipelago.json worlds/*/Register.py
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: add template files for new worlds" -m "Auto-generated by CI workflow for worlds: ${{ steps.detect.outputs.new_worlds }}" -m "MANUAL ACTION REQUIRED: Replace placeholder strings in the generated files."
            # Fetch latest changes and rebase before pushing
            git fetch origin gui-changes
            git rebase origin/gui-changes || {
              echo "Rebase failed, trying to pull with merge strategy"
              git pull --rebase origin gui-changes || exit 1
            }
            git push origin gui-changes
          fi

  build-changed-worlds:
    name: Build Changed Worlds
    runs-on: ubuntu-latest
    needs: check-new-worlds
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/gui-changes'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install build toml
      
      - name: Detect changed worlds
        id: detect_changed
        env:
          NEW_WORLDS: ${{ needs.check-new-worlds.outputs.new_worlds }}
        run: |
          cd src
          # Get changed files in worlds directories (excluding pyproject.toml to avoid rebuild loops)
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep '^worlds/' | grep -v 'pyproject.toml' || true)
          
          CHANGED_WORLDS=""
          
          if [ -n "$CHANGED_FILES" ]; then
            # Extract unique world names from changed files
            WORLDS=$(echo "$CHANGED_FILES" | grep -E '^worlds/[^/]+/' | cut -d'/' -f2 | sort -u || true)
            
            for world in $WORLDS; do
              # Skip special worlds and check if pyproject.toml exists
              if [[ "$world" != "_"* ]] && [[ "$world" != "generic" ]] && [ -f "worlds/$world/pyproject.toml" ]; then
                if [ -z "$CHANGED_WORLDS" ]; then
                  CHANGED_WORLDS="$world"
                else
                  CHANGED_WORLDS="$CHANGED_WORLDS,$world"
                fi
              fi
            done
          fi
          
          # Add new worlds from previous job if they exist and have pyproject.toml
          if [ -n "$NEW_WORLDS" ]; then
            for world in $NEW_WORLDS; do
              # Trim whitespace and check if world is valid and has pyproject.toml
              world=$(echo "$world" | xargs)
              if [ -n "$world" ] && [[ "$world" != "_"* ]] && [[ "$world" != "generic" ]] && [ -f "worlds/$world/pyproject.toml" ]; then
                # Check if world is not already in CHANGED_WORLDS
                if [[ ",$CHANGED_WORLDS," != *",$world,"* ]]; then
                  if [ -z "$CHANGED_WORLDS" ]; then
                    CHANGED_WORLDS="$world"
                  else
                    CHANGED_WORLDS="$CHANGED_WORLDS,$world"
                  fi
                fi
              fi
            done
          fi
          
          echo "changed_worlds=$CHANGED_WORLDS" >> $GITHUB_OUTPUT
          echo "Changed worlds: $CHANGED_WORLDS"
      
      - name: Build changed worlds
        if: steps.detect_changed.outputs.changed_worlds != ''
        run: |
          source venv/bin/activate
          cd src
          python tools/build_wheels.py --world "${{ steps.detect_changed.outputs.changed_worlds }}"
      
      - name: Configure git
        if: steps.detect_changed.outputs.changed_worlds != ''
        run: |
          cd src
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commit updated pyproject.toml files
        if: steps.detect_changed.outputs.changed_worlds != ''
        env:
          CHANGED_WORLDS: ${{ steps.detect_changed.outputs.changed_worlds }}
        run: |
          cd src
          # Only add pyproject.toml files for worlds that were actually built
          CHANGED_WORLDS="$CHANGED_WORLDS"
          FILES_TO_ADD=""
          
          IFS=',' read -ra WORLDS <<< "$CHANGED_WORLDS"
          for world in "${WORLDS[@]}"; do
            world=$(echo "$world" | xargs)  # Trim whitespace
            if [ -n "$world" ] && [ -f "worlds/$world/pyproject.toml" ]; then
              if [ -z "$FILES_TO_ADD" ]; then
                FILES_TO_ADD="worlds/$world/pyproject.toml"
              else
                FILES_TO_ADD="$FILES_TO_ADD worlds/$world/pyproject.toml"
              fi
            fi
          done
          
          if [ -n "$FILES_TO_ADD" ]; then
            git add $FILES_TO_ADD
            if git diff --staged --quiet; then
              echo "No pyproject.toml changes to commit"
            else
              git commit -m "chore: update world pyproject.toml versions [skip ci]"
              
              # Check for any other unstaged changes (from build artifacts, failed builds, etc.)
              if ! git diff --quiet; then
                echo "Warning: Unstaged changes detected, discarding them before rebase"
                git checkout -- . || true
                git clean -fd || true
              fi
              
              # Fetch latest changes and rebase before pushing
              git fetch origin gui-changes
              git rebase origin/gui-changes || {
                echo "Rebase failed, trying to pull with merge strategy"
                git pull --rebase origin gui-changes || exit 1
              }
              
              git push origin gui-changes
            fi
          else
            echo "No valid pyproject.toml files to add"
          fi
      
      - name: Upload to private PyPI
        if: steps.detect_changed.outputs.changed_worlds != ''
        env:
          TWINE_USERNAME: ${{ vars.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
          TWINE_REPOSITORY_URL: ${{ vars.PYPI_URL }}
        run: |
          source venv/bin/activate
          pip install twine
          for file in dist/worlds_*.whl dist/worlds_*.tar.gz; do
            if [ -f "$file" ]; then
              python -m twine upload "$file" --verbose || echo "Failed to upload $file, continuing..."
            fi
          done
      
      - name: Upload world wheels as artifacts
        if: steps.detect_changed.outputs.changed_worlds != ''
        uses: actions/upload-artifact@v4
        with:
          name: world-wheels
          path: |
            dist/worlds_*.whl
            dist/worlds_*.tar.gz
          retention-days: 30

